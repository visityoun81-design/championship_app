<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHAMPIONSHIP MASTER FINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@900&family=Orbitron:wght@700&display=swap" rel="stylesheet">


<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>


    <style>
        :root { --bg: #000; --purple: #c084fc; --green: #4ade80; --red: #f87171; --bead: #4ade80; --bar-top: 100px; --gold: #fbbf24; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Noto Sans KR', sans-serif; display: flex; height: 100vh; width: 100vw; overflow: hidden; touch-action: none; -webkit-user-select: none; user-select: none; flex-direction: row; }
        
        /* 왼쪽 패널 레이아웃 */
        #left-panel { width: 130px; background: #0a0a0a; border-right: 1px solid #222; flex-shrink: 0; display: flex; flex-direction: column; padding: 8px; font-size: 0.8rem; position: relative; }
        
     /* 과정 표시 스타일 추가 */
    #course-title {
        background: linear-gradient(
        to bottom,
        #BF953F, /* 어두운 금색 */
        #FCF6BA, /* 밝은 빛 반사 */
        #B38728, /* 중간 금색 */
        #FBF5B7, /* 하이라이트 */
        #AA771C  /* 그림자 깊이감 */
    );
 /* 글씨 영역에만 배경이 보이도록 설정 */
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    
    /* 입체감을 위한 강한 그림자 효과 */
    filter: drop-shadow(2px 2px 2px rgba(0, 0, 0, 0.8)) 
            drop-shadow(0 0 10px rgba(255, 215, 0, 0.5));
    
    font-weight: 900;
    text-align: center;
    padding: 10px;
    border-radius: 5px;
    margin-bottom: 5px;
    font-size: 1.0rem; /* 글씨 크기를 조금 더 키우면 효과가 잘 보입니다 */
    letter-spacing: 2px;
    
    /* 금속 광택이 흐르는 애니메이션 */
    background-size: 200% auto;
    animation: shine-gold 3s linear infinite;
}

/* 금속 광택 이동 애니메이션 */
@keyframes shine-gold {
    to {
        background-position: 200% center;
    }
}

        /* 디지털 시계 디자인 복구 */
        #timer-display { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 1.1rem; 
            color: var(--red); 
            text-align: center; 
            margin-bottom: 8px; 
            border: 1px solid var(--red); 
            padding: 4px; 
            border-radius: 5px; 
            background: rgba(248, 113, 113, 0.05);
        }

        /* 역전 알림 스타일 */
        #reversal-notice {
            background: var(--purple);
            color: white;
            padding: 4px 8px;
            border-radius: 10px;
            font-size: 0.65rem;
            font-weight: 900;
            text-align: center;
            margin-bottom: 8px;
            display: none;
            box-shadow: 0 0 10px var(--purple);
        }

        #step-info { color: var(--purple); font-family: 'Orbitron'; text-align: center; margin-bottom: 10px; font-weight: 900; }
        
        /* 연습기록 버튼 디자인 복구 */
        .log-btn {
            width: 100%; 
            background: #1a1a1a; 
            color: var(--gold); 
            border: 1px solid var(--gold); 
            padding: 8px; 
            font-size: 0.75rem; 
            border-radius: 6px; 
            font-weight: 900; 
            cursor: pointer; 
            margin-bottom: 10px;
            transition: all 0.2s;
        }
        .log-btn:hover { background: var(--gold); color: #000; }

        /* 랭킹 리스트 스타일 */
        #hall-of-fame { flex: 1; overflow-y: auto; margin-bottom: 8px; scrollbar-width: none; }
        #hall-of-fame::-webkit-scrollbar { width: 4px; }
        #hall-of-fame::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        /* 명예의 전당 한 줄 레이아웃 수정 */
    .rank-item { 
    display: grid; 
    grid-template-columns: 1fr 45px 55px; /* 이름(공간확보) 점수 소요시간 순서 */
    align-items: center; 
    padding: 6px 8px; 
    margin-bottom: 3px; 
    border-radius: 4px; 
    font-size: 0.65rem; /* 글자가 한 줄에 다 나오도록 살짝 조절 */
    font-weight: 900; 
    color: #000; 
    gap: 4px;
}

    .rank-item { 
    display: flex; justify-content: space-between; padding: 4px 6px; margin-bottom: 3px; 
    border-radius: 3px; 
    font-size: 0.65rem; 
    font-weight: 900; 
    color: #000; transition: all 0.3s; 
    position: relative; 
}

    .color-1 { background: #ffd700; } 
    .color-2 { background: #ff85a2; } 
    .color-3 { background: #4ea8de; } 
    .color-4 { background: #9d4edd; } 
    .color-5 { background: #ff9100; } 
    .color-other { background: var(--green); }
        
     /* 무지개 번개 효과 */
    .is-playing { 
    animation: rainbow-super-shine 0.6s infinite alternate; /* 속도를 0.6초로 당겨 더 빠르게 깜빡임 */
    position: relative;
    border: 2px solid #fff !important; /* 테두리를 흰색으로 강조 */
    transform: scale(1.05); /* 크기를 살짝 키워 강조 */
    z-index: 5;
}

    /* 이름 옆의 번개 아이콘도 더 화려하게 */
    .is-playing::after { 
    content: "⚡"; 
    position: absolute; 
    right: 20px; 
    font-size: 1rem; 
    text-shadow: 0 0 5px white;
    animation: thunder-bolt 0.3s infinite alternate; 
}

     .my-record { border: 3px solid #ff0000 !important; box-shadow: 0 0 15px #ff0000; z-index: 10; }
     .rank-item.first-place { border: 2px solid #fff !important; }

     .crown-icon { 
     display: inline-block; 
     margin-left: 5px; 
     font-size: 1rem; 
     filter: drop-shadow(0 0 2px rgba(0,0,0,0.8)); 
     animation: trophy-bounce 0.8s infinite alternate; vertical-align: middle; 
}

    @keyframes rainbow-super-shine { 
    0% { 
     box-shadow: 0 0 5px #ff0000, inset 0 0 5px #ff0000; 
     filter: brightness(1.2); 
    } 
    33% { 
     box-shadow: 0 0 7px #00e1ff, inset 0 0 5px #00e1ff; 
     filter: brightness(1.3); 
    }
    66% { 
     box-shadow: 0 0 10px #ffea00, inset 0 0 5px #ffea00; 
     filter: brightness(1.4); 
    }
    100% { 
     box-shadow: 0 0 13px #ff00ff, inset 0 0 5px #ff00ff; 
     filter: brightness(1.5);
    } 
}

      @keyframes thunder-bolt { from { transform: scale(1); opacity: 0.7; } to { transform: scale(1.3); opacity: 1; } }
      @keyframes trophy-bounce { from { transform: translateY(0); } to { transform: translateY(-3px); } }
      /* 역전 알림이 부드럽게 나타났다 사라지는 효과 */
      @keyframes fade-up { 0% { opacity: 0; transform: translateY(5px); } 20% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-5px); } }

       /* 메인 게임 영역 */
       #center-game { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; }
       #display-main { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; z-index: 10; flex-direction: column; font-size: 5.0rem; font-weight: 900; position: relative; }
        .board-rows-234 { font-size: 3.0rem; }
        .board-rows-5 { font-size: 2.8rem; }
        .board-rows-7 { font-size: 2.7rem; }
        .rolling-num { position: absolute; font-weight: 900; font-size: 3.2rem; color: var(--green); animation: continuousRoll var(--roll-dur, 2000ms) linear forwards; }

        @keyframes continuousRoll { 0% { transform: translateY(40vh); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-40vh); opacity: 0; } }
        
        #feedback-area { position: absolute; left: 8%; top: 50%; transform: translateY(-50%); z-index: 2000; pointer-events: none; }
        #feedback-icon { font-size: 5rem; font-weight: 900; display: none; }
        .correct { color: #4ade80 !important; text-shadow: 0 0 25px #4ade80; }
        .wrong { color: #f87171 !important; text-shadow: 0 0 20px #f87171; }
        
        .abacus-frame { display: flex; gap: 4px; position: relative; padding: 10px 15px; border: 8px solid #3d2b1f; border-radius: 8px; background: #000; height: 280px; }
        .master-divider { position: absolute; top: var(--bar-top); left: 0; width: 100%; height: 10px; background: #ddd; z-index: 15; }
        .column { position: relative; width: 46px; height: 100%; display: flex; flex-direction: column; align-items: center; }
        .rod { width: 4px; height: 100%; background: #444; position: absolute; left: 50%; transform: translateX(-50%); }
        .bead { width: 46px; height: 32px; background: radial-gradient(circle at 50% 30%, #66ef96 0%, #4ade80 40%, #2d8a50 100%); border-radius: 40% / 50%; border: 1px solid #1a5c34; position: absolute; z-index: 10; }
        
        #right-keypad { width: 280px; background: #0d0d0d; border-left: 1px solid #222; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        #display-answer { background: #fff; height: 60px; border-radius: 8px; color: #000; font-size: 2.5rem; display: flex; align-items: center; justify-content: center; font-weight: 900; border: 4px solid var(--purple); margin-bottom: 5px; }
        .key { background: #2a2a2a; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; border-radius: 10px; cursor: pointer; box-shadow: 0 4px #000; font-weight: 900; }
        
        #schulte-overlay { position: fixed; inset: 0; background: #000; z-index: 15000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 10px; box-sizing: border-box; }

     .game-header { 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    gap: 5px;            /* 제목과 타이머 사이 간격 줄임 */
    margin-bottom: 5px;  /* 제목 세트와 아래 숫자판 사이 간격 줄임 */
    margin-top: -30px;   /* 전체를 위로 30px 끌어올림 */
    width: 100%; 
    z-index: 17000; 
}

     #game-target-msg { 
    color: var(--gold); 
    font-size: 1.1rem; 
    font-weight: 900; 
    background: rgba(0,0,0,0.8); 
    padding: 4px 15px; 
    border-radius: 20px; 
    border: 1px solid var(--gold);
    /* position: absolute;  <-- 이 부분을 삭제하거나 주석 처리하세요 */
    /* top: 10px;           <-- 이 부분도 삭제하세요 */
    margin-bottom: 5px;    /* 제목과 시간 바 사이의 간격 생성 */
    z-index: 18000;
}
        #schulte-timer-container { width: 220px; height: 12px; background: #333; border-radius: 6px; overflow: hidden; border: 1px solid #555; }
        #schulte-timer-bar { width: 100%; height: 100%; background: var(--purple); }
        .schulte-grid { display: grid; gap: 8px; width: 90vw; max-width: 380px; max-height: 60vh; aspect-ratio: 1 / 1; }
        .schulte-cell { background: #1a1a1a; border: 2px solid #444; color: #fff; display: flex; align-items: center; justify-content: center; font-size: clamp(1.2rem, 6vw, 2.2rem); font-weight: 900; border-radius: 10px; cursor: pointer; }
        
        #block-container { position: absolute; inset: 0; display: none; background: #000; overflow: hidden; z-index: 16000; }
        .block { position: absolute; width: 60px; height: 60px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 900; color: #fff; cursor: pointer; z-index: 16500; border: 1px solid rgba(255,255,255,0.3); transition: top 1.2s ease-in; }

        #schulte-msg { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; z-index: 18000; background: #000; }
        .result-card { background: rgba(15, 15, 15, 0.98); border-radius: 20px; border: 3px solid var(--purple); text-align: center; padding: 20px; box-shadow: 0 0 40px rgba(192, 132, 252, 0.4); width: 90%; max-width: 450px; margin: auto; }
        .history-list { overflow-y: auto; margin-top: 10px; scrollbar-width: thin; padding-right: 5px; text-align: left; }


        /* 연습기록 항목을 촘촘하고 예쁘게 수정 */
    .history-item { 
    display: grid; 
    grid-template-columns: 1.2fr 0.8fr 0.8fr 0.5fr; /* 날짜 / 연습시간 / 소요시간 / 점수 */
    align-items: center; 
    background: #1a1a1a; 
    padding: 4px 8px; /* 간격을 좁게 조정 */
    margin-bottom: 2px; /* 항목 사이 틈을 최소화 */
    border-radius: 4px; 
    font-size: 0.65rem; 
    border-left: 3px solid var(--gold); 
    border-bottom: 1px solid #222;
}

    .history-item .log-date { color: #888; }
    .history-item .log-time { color: #aaa; text-align: center; }
    .history-item .log-duration { color: var(--purple); text-align: center; }
    .history-item .log-score { color: var(--gold); font-weight: 900; text-align: right; font-size: 0.75rem; }
        
     #history-popup { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 25000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
      .close-x:hover { color: var(--red); }

/*휴대폰을 세로로 볼때 적용되는 스타일*/
@media (orientation: portrait) { 
    body { flex-direction: column; } 
    #left-panel { display: none !important; } 
    #right-keypad { 
        width: 100% !important; 
        height: 42% !important; /* 세로 키보드 판의 화면전체너비의 42%차지 */
        border-top: 1px solid #222; 
        padding: 10px !important; 
        box-sizing: border-box; 
    } 
    #center-game { flex: 1; width: 100%; height: auto; } 
    #display-answer { 
        width: 90% !important; 
        /* 답안 칸이 작아졌다면 height 수치를 다시 확인해 주세요 (기본은 flex에 의해 결정되거나 약 60px) */
        height: 60px !important; 
        margin: 0 auto 10px auto !important; 
    } 
    .abacus-frame { transform: scale(0.75) !important; }
}

/*휴대폰 가로모드 적용되는 스타일*/
@media (orientation: landscape) {
    /* 가로 모드에서 키보드의 세로 높이가 무식하게 길어지는 걸 방지 */
    #right-keypad { 
        height: 100% !important; 
        max-height: 350px !important; /* 위 아래로 커지기 방지하기 위해 높이 크기를 제한합니다 */
        margin: auto 0; /* 키보드를 화면 세로 중앙에 배치 */
        display: flex;
        flex-direction: column;
        justify-content: center;
    }
    .abacus-frame { transform: scale(0.75) !important; }
    .result-card { max-height: 90vh !important; width: 460px !important; padding: 15px !important; }
    .history-list { max-height: 120px !important; }
    #display-answer { height: 50px !important; font-size: 2rem !important; }
}


    </style>
</head>

<body oncontextmenu="return false" onclick="handleAutoFullscreen()">

    <div id="fs-trigger" style="position:fixed; inset:0; background:#000; z-index:20000; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer;">
        <h1 style="color:var(--purple); font-family:'Orbitron'; letter-spacing: 5px;">ENTER CHAMPIONSHIP</h1>
        <input type="text" id="user-name" placeholder="이름을 입력하세요" onclick="event.stopPropagation()" style="margin-top:20px; padding:12px; font-size:1.4rem; text-align:center; border-radius:10px; border:none; width:220px;">
        <button onclick="goFullScreen()" style="margin-top:20px; padding:15px 40px; background:var(--purple); color:white; border:none; border-radius:10px; font-size:1.2rem; font-weight:900; cursor:pointer;">시작하기</button>
    </div>
    
    <div id="time-over-screen" style="position:fixed; inset:0; background:#000; z-index:21000; display:none; align-items:center; justify-content:center; font-size:5rem; font-weight:900; color:var(--red); font-family:'Orbitron';">TIME OVER</div>

    <div id="left-panel">
        <div id="timer-display">07:00</div>
        <div id="course-title">암산챔피언쉽</div>
        <div id="reversal-notice">⚡ 역전 성공! ⚡</div>
        <div id="step-info">STEP 1/90</div>
        <button class="log-btn" onclick="showPracticeLogs()">📜 연습기록</button>
        <div id="hall-of-fame"></div>
    </div>

    <div id="center-game">
        <div id="feedback-area"><div id="feedback-icon"></div></div>
        <div id="display-main"></div>
        <div id="rolling-stage" style="position:absolute; inset:0; pointer-events:none; display:flex; justify-content:center; align-items:center;"></div>
        <div id="hint-text" style="font-size:1.2rem; color:rgba(255,255,255,0.15); font-weight:400; text-align:center; display:none; position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); width:100%; z-index:11;">답을 입력하세요!!</div>
    </div>

    <div id="right-keypad">
        <div id="display-answer"></div>
        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; flex: 1;">
            <div class="key" onpointerdown="fnIn('1')">1</div><div class="key" onpointerdown="fnIn('2')">2</div><div class="key" onpointerdown="fnIn('3')">3</div>
            <div class="key" style="grid-column: 4; grid-row: 1 / 5; background: var(--green); color: #000; writing-mode: vertical-rl; text-orientation: upright; font-size: 1.4rem; letter-spacing: 4px;" onpointerdown="fnOk()">확인</div>
            <div class="key" onpointerdown="fnIn('4')">4</div><div class="key" onpointerdown="fnIn('5')">5</div><div class="key" onpointerdown="fnIn('6')">6</div>
            <div class="key" onpointerdown="fnIn('7')">7</div><div class="key" onpointerdown="fnIn('8')">8</div><div class="key" onpointerdown="fnIn('9')">9</div>
            <div class="key" style="background:#333;" onpointerdown="fnIn('AC')">AC</div><div class="key" onpointerdown="fnIn('0')">0</div><div class="key" onpointerdown="fnIn('back')">←</div>
        </div>
    </div>

    <div id="history-popup">
        <div style="background: rgba(10, 10, 10, 0.95); padding: 25px 20px; border-radius: 20px; border: 2px solid var(--gold); width: 340px; max-height: 80vh; position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.8);">
            <div class="close-x" onclick="document.getElementById('history-popup').style.display='none'">&times;</div>
            <h3 style="color:var(--gold); text-align:center; margin-top:0; font-size:1.3rem; letter-spacing: -1px; margin-bottom: 20px;">🏆 내 연습 기록 <span style="font-size:0.8rem; color:#666; font-weight:normal;">(최근순)</span></h3>
            <div id="my-log-list" style="max-height: 50vh; overflow-y: auto; padding-right: 5px;"></div>
            <button onclick="document.getElementById('history-popup').style.display='none'" style="width:100%; margin-top:20px; padding:12px; background: #222; color: #aaa; border: 1px solid #444; border-radius: 10px; font-weight: bold; cursor: pointer;">닫기</button>
        </div>
    </div>

    <div id="schulte-overlay">
        <div class="game-header" id="mini-game-header">
            <div id="game-target-msg">미션 준비중...</div>
            <div id="schulte-timer-container"><div id="schulte-timer-bar"></div></div>
        </div>
        <div id="schulte-table" class="schulte-grid"></div>
        <div id="block-container"></div>
        <div id="schulte-msg"></div>
    </div>

    <script>
        let lastTopPlayer = "";
       const problems = {

6:{type:'flash',row:3,speed:600,dig:1},
7:{type:'flash',row:3,speed:600,dig:1},
8:{type:'flash',row:4,speed:600,dig:1},
9:{type:'flash',row:4,speed:600,dig:1},
10:{type:'flash',row:5,speed:600,dig:1},

11:{type:'rolling',row:5,speed:1000,dig:1},
12:{type:'rolling',row:5,speed:1000,dig:1},
13:{type:'rolling',row:5,speed:1000,dig:1},
14:{type:'rolling',row:7,speed:1200,dig:1},
15:{type:'rolling',row:7,speed:1200,dig:1},

16:{type:'abacus',dig:2,speed:1500},
17:{type:'abacus',dig:2,speed:1500},
18:{type:'abacus',dig:3,speed:1500},
19:{type:'abacus',dig:3,speed:1500},
20:{type:'abacus',dig:4,speed:1500},
21:{type:'abacus',dig:4,speed:1500},
22:{type:'abacus',dig:5,speed:1500},

function showSchulte(size, timeLimit) {
    if(isTimeUp) return; 
    isGaming = true; 
    busy = true; 
    
    const overlay = document.getElementById('schulte-overlay');
    const table = document.getElementById('schulte-table');
    const bar = document.getElementById('schulte-timer-bar');
    const header = document.getElementById('mini-game-header');
    const msgArea = document.getElementById('schulte-msg');

    overlay.style.display = 'flex'; 
    table.style.display = 'grid'; 
    header.style.display = 'flex';
    msgArea.style.display = 'none';
    table.innerHTML = '';

    table.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
    table.style.gridTemplateRows = `repeat(${size}, 1fr)`;
    
    let next = 1; 
    let max = size * size;
    let nums = Array.from({length: max}, (_, i) => i + 1).sort(() => Math.random() - 0.5);

    nums.forEach(n => { 
        const cell = document.createElement('div'); 
        cell.className = 'schulte-cell'; 
        cell.innerText = n; 
        cell.onpointerdown = (e) => { 
            e.preventDefault(); 
            if(n === next){ 
                playSfx('click'); 
                cell.style.visibility = 'hidden'; 
                next++; 
                if(next > max) finishSchulte(true); 
            } 
        };
        table.appendChild(cell); 
    });

    let start = Date.now(); 
    let si = setInterval(() => { 
        let rem = Math.max(0, timeLimit - (Date.now() - start)); 
        bar.style.width = (rem / timeLimit * 100) + "%"; 
        if(rem <= 0 || !isGaming || isTimeUp){ 
            clearInterval(si); 
            if(rem <= 0 && isGaming && !isTimeUp) finishSchulte(false); 
        }
    }, 50);
}

            const col = Math.floor(Math.random()*cols); 
            const b=document.createElement('div'); b.className='block'; b.innerText=val; 
            b.style.left=(col*70 + 10)+"px"; b.style.top="-80px"; 
            b.style.background=`linear-gradient(135deg, hsl(${Math.random()*360},70%,50%), hsl(${Math.random()*360},70%,30%))`; 
            b.onpointerdown=(e)=>{ e.stopPropagation(); e.preventDefault(); if(sel===b){ sel=null; b.style.border="none"; } else if(!sel){ sel=b; b.style.border="4px solid #fff"; } else { if(parseInt(sel.innerText)+parseInt(b.innerText)===targetSum){ playSfx('magic'); const s=sel; stackedBlocks=stackedBlocks.filter(x=>x!==s && x!==b); s.remove(); b.remove(); bScore++; sel=null; setTimeout(applyGravity, 50); } else { playSfx('click'); sel.style.border="none"; sel=b; b.style.border="4px solid #fff"; } } }; 
            area.appendChild(b); stackedBlocks.push(b); setTimeout(()=>updateBlockPos(b), 50);
        }
        if(isGaming) setTimeout(spawnGroup, 1200); 
    }

    // 막혀있던 괄호 문제를 모두 해결한 코드입니다
    function updateBlockPos(b) { if(!b.parentElement) return; let colX = parseInt(b.style.left); let targetY = area.clientHeight - B_SIZE - 5; stackedBlocks.forEach(other => { if(other !== b && Math.abs(parseInt(other.style.left) - colX) < 10) { let otherY = parseInt(other.style.top); if(otherY > b.offsetTop) targetY = Math.min(targetY, otherY - B_SIZE - 2); } }); b.style.top = targetY + "px"; }
    function applyGravity() { stackedBlocks.sort((a,b)=>b.offsetTop-a.offsetTop).forEach(b=>updateBlockPos(b)); }
    function finishBlock(){ isGaming=false; area.style.display='none'; header.style.display='none'; let bonus = (bScore>=10)?2:(bScore>=5)?1:0; totalScore+=bonus; if(bonus>0) playSfx('bonus'); msgArea.style.display='flex'; msgArea.innerHTML=`<div style="font-size:2rem; font-weight:900; color:var(--gold); text-align:center;">맞춘 개수: ${bScore}개<br><span style="color:var(--green);">보너스 +${bonus}점</span></div>`; setTimeout(()=>{overlay.style.display='none'; busy=false; initGame();},2500); } 
    
    spawnGroup(); 
    let ti=setInterval(()=>{ if(isTimeUp||!isGaming){clearInterval(ti); return;} bTime-=0.1; bar.style.width=(bTime/30*100)+"%"; if(bTime<=0){clearInterval(ti); finishBlock();} },100);
}

        function showTimeOver() { isTimeUp = true; const tos = document.getElementById('time-over-screen'); tos.style.display = 'flex'; playSfx('finish'); setTimeout(() => { tos.style.display = 'none'; showFinalResult(); }, 2000); }


function showFinalResult() { 
    saveRecord(true); 
    const msgArea = document.getElementById('schulte-msg');
    const spent = 480 - timeLeft;
    const m = Math.floor(spent/60);
    const s = spent%60;
    const timeDisplay = (timeLeft <= 0) ? "08:00 (Time Over)" : `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

    msgArea.innerHTML = `
        <div class="result-card">
            <h2 style="color:var(--green); margin:0 0 5px 0; font-size:1.1rem;">${playerName.replace(/[0-9]/g, '')}님 결과</h2>
            <div style="font-size:1.1rem; color:var(--gold); font-weight:900; margin-bottom:10px;">소요 시간: ${timeDisplay}</div>
            <h1 style="font-size:3rem; margin:5px 0; color:white; text-shadow:0 0 10px var(--purple);">${totalScore}점</h1>
            
            <div style="background:rgba(255,255,255,0.08); padding:10px; border-radius:12px; margin-bottom:12px; display:flex; justify-content:space-around;">
                <div><div style="color:var(--gold); font-size:0.7rem;">누적 보석</div><div style="font-size:1.2rem; font-weight:900;">💎 ${parseInt(localStorage.getItem('userGems')||0)}</div></div>
                <div><div style="color:var(--purple); font-size:0.7rem;">누적 코인</div><div style="font-size:1.2rem; font-weight:900;">🪙 ${parseInt(localStorage.getItem('userCoins')||0)}</div></div>
            </div>

            <button onclick="location.reload()" style="margin-top:10px; padding:12px; background:var(--green); border:none; font-weight:900; border-radius:10px; width:48%; cursor:pointer;">다시 시작</button>
            <button onclick="location.reload()" style="margin-top:10px; padding:12px; background:var(--purple); color:white; border:none; font-weight:900; border-radius:10px; width:48%; cursor:pointer;">다시 도전하기!</button>
        </div>`; 
    document.getElementById('schulte-overlay').style.display='flex';
    msgArea.style.display='flex';


    
    // 데이터 불러오기
    let allRanks = JSON.parse(localStorage.getItem('rank_championship') || "[]").sort((a,b)=>b.score - a.score); 
    const realNameOnly = playerName.replace(/[0-9]/g, ''); 
    
    // 현재 게임 순위 계산
    let myRank = allRanks.findIndex(r => r.name === playerName) + 1;
    
    // 누적 보상 가져오기
    let totalGems = parseInt(localStorage.getItem('userGems') || "0");
    let totalCoins = parseInt(localStorage.getItem('userCoins') || "0");
    
    // 이번 게임 보상 (기존 로직 유지: 점수당 보석 1개, 참가 코인 100개)
    let earnedGems = Math.floor(totalScore / 10);
    let earnedCoins = 100;

    let bestRecords = {}; 
    allRanks.forEach(r => { if(!bestRecords[r.realName] || bestRecords[r.realName].score < r.score) bestRecords[r.realName] = r; });
    let sortedBests = Object.values(bestRecords).sort((a,b)=>b.score - a.score); 
    const medals = ["🏆 1위", "🥈 2위", "🥉 3위", "🏅 4위", "🎖️ 5위"]; 

    msgArea.innerHTML = `
        <div class="result-card">
            <h2 style="color:var(--green); margin:0 0 5px 0; font-size:1.1rem;">${realNameOnly}님 결과</h2>
            <div style="font-size:1.2rem; color:var(--gold); font-weight:900;">현재 순위: ${myRank}위</div>
            <h1 style="font-size:3rem; margin:5px 0; color:white; text-shadow:0 0 10px var(--purple);">${totalScore}점</h1>
            
            <div style="background:rgba(74, 222, 128, 0.1); padding:8px; border-radius:10px; margin-bottom:10px; border:1px solid var(--green);">
                <span style="font-size:0.75rem; color:var(--green);">이번 게임 보상:</span>
                <span style="font-weight:900; margin-left:10px;">💎 ${earnedGems}  🪙 ${earnedCoins}</span>
            </div>

            <div style="background:rgba(255,255,255,0.08); padding:10px; border-radius:12px; margin-bottom:12px; display:flex; justify-content:space-around; align-items:center;">
                <div><div style="color:var(--gold); font-size:0.7rem;">누적 보석</div><div style="font-size:1.2rem; font-weight:900;">💎 ${totalGems}</div></div>
                <div style="width:1px; height:25px; background:#444;"></div>
                <div><div style="color:var(--purple); font-size:0.7rem;">누적 코인</div><div style="font-size:1.2rem; font-weight:900;">🪙 ${totalCoins}</div></div>
            </div>

            <div style="font-weight:900; color:var(--gold); font-size:0.8rem; margin-bottom:8px; border-bottom:1px solid #333; padding-bottom:5px;">🏆 명예의 전당 🏆</div>
            <div class="history-list">
                ${sortedBests.map((r, i) => `<div class="history-item"><span style="color:var(--gold); font-weight:900;">${i<5?medals[i]:(i+1)+'.'}</span><span style="color:#fff; font-weight:700;">${r.realName}</span><span style="color:#888; font-size:0.55rem; text-align:center;">${r.fullDate}</span><span style="text-align:right; font-weight:900; color:var(--green);">${r.score}</span></div>`).join('')}
            </div>
            <button onclick="location.reload()" style="margin-top:15px; padding:12px; background:var(--green); border:none; font-weight:900; border-radius:10px; width:100%; cursor:pointer; font-size:1.1rem; box-shadow:0 4px #2d8a50;">다시 시작하기</button>
        </div>`; 
}


        window.addEventListener('keydown', (e) => { if(busy || isTimeUp) return; if(e.key >= '0' && e.key <= '9') fnIn(e.key); else if(e.key === 'Enter') fnOk(); else if(e.key === 'Backspace') fnIn('back'); else if(e.key === 'Escape') fnIn('AC'); });
        setInterval(updateHallOfFame, 3000);
    </script>
</body>
</html>
