        function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playSfx(type) { 
            if(!audioCtx) return; 
            if(audioCtx.state==='suspended') audioCtx.resume(); 
            const now = audioCtx.currentTime; 
            if(type==='magic' || type==='bonus'){ 
                [880, 1318].forEach((f, i) => { const osc = audioCtx.createOscillator(), gain = audioCtx.createGain(); osc.type = 'sine'; osc.connect(gain); gain.connect(audioCtx.destination); osc.frequency.setValueAtTime(f, now + i*0.05); gain.gain.setValueAtTime(0, now + i*0.05); gain.gain.linearRampToValueAtTime(0.06, now + i*0.05 + 0.02); gain.gain.exponentialRampToValueAtTime(0.001, now + i*0.05 + 0.3); osc.start(now + i*0.05); osc.stop(now + i*0.05 + 0.4); }); 
            } else if(type==='click'){ 
                const o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.frequency.setValueAtTime(1000,now); g.gain.setValueAtTime(0.05,now); o.start(); o.stop(now+0.05); 
            } else if(type==='correct'){ 
                const o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.frequency.setValueAtTime(600,now); g.gain.setValueAtTime(0.1,now); o.start(); o.stop(now+0.2); 
            } else if(type==='wrong'){ 
                const o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.frequency.setValueAtTime(220,now); g.gain.setValueAtTime(0.05,now); o.start(); o.stop(now+0.15); if(window.navigator.vibrate) window.navigator.vibrate(200); 
            } else if(type==='typechange'){ 
                [880, 1109, 1318].forEach((f, i) => { const o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.frequency.setValueAtTime(f, now+i*0.1); g.gain.setValueAtTime(0.02, now+i*0.1); o.start(now+i*0.1); o.stop(now+i*0.1+0.3); }); 
            } else if(type==='finish'){ 
                [440, 554, 659, 880].forEach((f, i) => { const o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.type='sine'; o.frequency.setValueAtTime(f, now+i*0.15); g.gain.setValueAtTime(0.1, now+i*0.15); o.start(now+i*0.15); o.stop(now+i*0.15+0.8); }); 
            } 
        }

        function initGame() {

        function runProblem(p) {
            const main = document.getElementById('display-main'), stage = document.getElementById('rolling-stage');

            const hint = document.getElementById('hint-text');
            if (p.type === 'abacus' || p.type === 'numread') {
                let s = ""; for (let i = 0; i < p.dig; i++) s += (i === 0) ? Math.floor(Math.random() * 9) + 1 : Math.floor(Math.random() * 10);
                ans = parseInt(s);
                if (p.type === 'abacus') { 
                    main.innerHTML = (function(num){
                        let h=`<div class="abacus-container"><div class="abacus-frame"><div class="master-divider"></div>`;

                            for(let j=1; j<=(v%5); j++) h+=`<div class="bead" style="top:${101 + (j-1)*34}px; position:absolute;"></div>`; 
                            h+=`</div>`; 
                        });
                        return h+`</div></div>`;
                    })(s);
                    setTimeout(() => { if(!isTimeUp) { main.innerHTML = ""; hint.style.display = 'block'; } }, 1500); 
                } else { main.innerText = s; setTimeout(() => { if(!isTimeUp) { main.innerText = ""; hint.style.display = 'block'; } }, 1500); }
            } else {
                for (let i = 0; i < p.row; i++) { let min = Math.pow(10, p.dig - 1); let max = Math.pow(10, p.dig) - 1; let n = Math.floor(Math.random() * (max - min + 1)) + min; nums.push(n); ansVal += n; }
                ans = ansVal;
                if (p.type === 'board') {
                    let bHtml = `<div class="board-list ${p.row === 5 ? 'board-rows-5' : p.row >= 7 ? 'board-rows-7' : 'board-rows-234'}" style="line-height:1.1; color:var(--green); text-align:center; letter-spacing:2px; display:flex; flex-direction:column; align-items:center; width:100%;">`;
                    nums.forEach(n => bHtml += `<div>${n}</div>`);
                    main.innerHTML = bHtml + `<div style="width:200px; border-bottom:4px solid rgba(255,255,255,0.4); margin:12px auto;"></div><div style="font-size:1.1rem; color:rgba(255,255,255,0.15); font-weight:400;">답을 입력하세요!!</div></div>`;
                } else if (p.type === 'flash') {
                    let idx = 0; let iv = setInterval(() => { if(isTimeUp){clearInterval(iv); return;} playSfx('click'); main.innerText = nums[idx++]; setTimeout(() => { main.innerText = ""; if (idx >= nums.length && !isTimeUp) hint.style.display = 'block'; }, p.speed - 100); if (idx >= nums.length) clearInterval(iv); }, p.speed);
                } else if (p.type === 'rolling') { 
                    let idx = 0; let iv = setInterval(() => { if(isTimeUp){clearInterval(iv); return;} if (idx === 0) playSfx('click'); const d = document.createElement('div'); d.className = 'rolling-num'; d.innerText = nums[idx++]; d.style.setProperty('--roll-dur', (p.speed + 800) + 'ms'); stage.appendChild(d); if (idx >= nums.length) { clearInterval(iv); setTimeout(() => { if(!isTimeUp) hint.style.display = 'block'; }, p.speed + 400); } }, 350); 
                }
            }
        }

        // ------------------ 미니 게임 ------------------
        function showSchulte(size, timeLimit) {
            if(isTimeUp) return; 
            isGaming = true; 
            busy = true; 
            
            const overlay = document.getElementById('schulte-overlay');
            const table = document.getElementById('schulte-table');
            const bar = document.getElementById('schulte-timer-bar');
            const header = document.getElementById('mini-game-header');
            const msgArea = document.getElementById('schulte-msg');

            overlay.style.display = 'flex'; 
            table.style.display = 'grid'; 
            header.style.display = 'flex';
            msgArea.style.display = 'none';
            table.innerHTML = '';

            table.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            table.style.gridTemplateRows = `repeat(${size}, 1fr)`;
            
            let next = 1; 
            let max = size * size;
            let nums = Array.from({length: max}, (_, i) => i + 1).sort(() => Math.random() - 0.5);

            nums.forEach(n => { 
                const cell = document.createElement('div'); 
                cell.className = 'schulte-cell'; 
                cell.innerText = n; 
                cell.onpointerdown = (e) => { 
                    e.preventDefault(); 
                    if(n === next){ 
                        playSfx('click'); 
                        cell.style.visibility = 'hidden'; 
                        next++; 
                        if(next > max) finishSchulte(true); 
                    } 
                };
                table.appendChild(cell); 
            });

            let start = Date.now(); 
            let si = setInterval(() => { 
                let rem = Math.max(0, timeLimit - (Date.now() - start)); 
                bar.style.width = (rem / timeLimit * 100) + "%"; 
                if(rem <= 0 || !isGaming || isTimeUp){ 
                    clearInterval(si); 
                    if(rem <= 0 && isGaming && !isTimeUp) finishSchulte(false); 
                }
            }, 50);
        }

            }

            setTimeout(()=>{document.getElementById('schulte-overlay').style.display='none'; isGaming=false; busy=false; initGame();},1500); 
        }

        function startBlockGame() {
            if(isTimeUp) return; isGaming=true; busy=true; blockGameCount++;
            
            const overlay=document.getElementById('schulte-overlay');
            const area=document.getElementById('block-container');
            const bar=document.getElementById('schulte-timer-bar');
            const header=document.getElementById('mini-game-header');
            const msgArea=document.getElementById('schulte-msg');

            header.style.position = "absolute"; header.style.top = "40px"; header.style.zIndex = "17000";
            overlay.style.display='flex'; area.style.display='block'; area.innerHTML=""; 
            document.getElementById('schulte-table').style.display='none';
            msgArea.style.display='none'; header.style.display='flex';

            let targetSum = (blockGameCount===1)?20:24; 
            document.getElementById('game-target-msg').innerText = `[${targetSum} 만들기]`;
            
            let bScore=0, bTime=30.0, sel=null, stackedBlocks=[]; const B_SIZE=60; 
            const cols = Math.floor(window.innerWidth / 70);

            function spawnGroup() { 
                if(!isGaming||isTimeUp) return; 
                let count = 4 + Math.floor(Math.random()*2);
                for(let i=0; i<count; i++) {
                    let val = Math.floor(Math.random()*(targetSum-1))+1; 
                    const col = Math.floor(Math.random()*cols); 
                    const b=document.createElement('div'); b.className='block'; b.innerText=val; 
                    b.style.left=(col*70 + 10)+"px"; b.style.top="-80px"; 
                    b.style.background=`linear-gradient(135deg, hsl(${Math.random()*360},70%,50%), hsl(${Math.random()*360},70%,30%))`; 
                    b.onpointerdown=(e)=>{ e.stopPropagation(); e.preventDefault(); if(sel===b){ sel=null; b.style.border="none"; } else if(!sel){ sel=b; b.style.border="4px solid #fff"; } else { if(parseInt(sel.innerText)+parseInt(b.innerText)===targetSum){ playSfx('magic'); const s=sel; stackedBlocks=stackedBlocks.filter(x=>x!==s && x!==b); s.remove(); b.remove(); bScore++; sel=null; setTimeout(applyGravity, 50); } else { playSfx('click'); sel.style.border="none"; sel=b; b.style.border="4px solid #fff"; } } }; 
                    area.appendChild(b); stackedBlocks.push(b); setTimeout(()=>updateBlockPos(b), 50);
                }
                if(isGaming) setTimeout(spawnGroup, 1200); 
            }

            function updateBlockPos(b) { if(!b.parentElement) return; let colX = parseInt(b.style.left); let targetY = area.clientHeight - B_SIZE - 5; stackedBlocks.forEach(other => { if(other !== b && Math.abs(parseInt(other.style.left) - colX) < 10) { let otherY = parseInt(other.style.top); if(otherY > b.offsetTop) targetY = Math.min(targetY, otherY - B_SIZE - 2); } }); b.style.top = targetY + "px"; }
            function applyGravity() { stackedBlocks.sort((a,b)=>b.offsetTop-a.offsetTop).forEach(b=>updateBlockPos(b)); }
            
            function finishBlock(){ 
                isGaming=false; area.style.display='none'; header.style.display='none'; 
                let bonus = (bScore>=10)?2:(bScore>=5)?1:0; 
                totalScore+=bonus; updateLiveScoreDisplay();
                if(bonus>0) playSfx('bonus'); 
                msgArea.style.display='flex'; 
                msgArea.innerHTML=`<div style="font-size:2rem; font-weight:900; color:var(--gold); text-align:center;">맞춘 개수: ${bScore}개<br><span style="color:var(--green);">보너스 +${bonus}점</span></div>`; 
                setTimeout(()=>{overlay.style.display='none'; busy=false; initGame();},2500); 
            } 
            
            spawnGroup(); 
            let ti=setInterval(()=>{ if(isTimeUp||!isGaming){clearInterval(ti); return;} bTime-=0.1; bar.style.width=(bTime/30*100)+"%"; if(bTime<=0){clearInterval(ti); finishBlock();} },100);
        }

        // ------------------ 저장 및 무적 방어 랭킹 ------------------
        function showTimeOver() { isTimeUp = true; const tos = document.getElementById('time-over-screen'); tos.style.display = 'flex'; playSfx('finish'); setTimeout(() => { tos.style.display = 'none'; showFinalResult(); }, 2000); }

        function saveRecord(finished) { 
            const loginId = localStorage.getItem('loginId') || "guest_" + playerName; 
            const db = firebase.database(); 

            db.ref('rankings/rank_championship/' + loginId).once('value', (snap) => {
                let existingRecord = snap.val() || { score: 0 };
                let oldScore = existingRecord.score || 0;
                let isUpdatingScore = totalScore > oldScore;
                let newScore = Math.max(totalScore, oldScore);
                
                let dateToSave = isUpdatingScore ? getFormattedDate() : (existingRecord.fullDate || getFormattedDate());

                if (totalScore >= oldScore || finished) {
                    db.ref('rankings/rank_championship/' + loginId).update({
                        name: playerName,
                        score: newScore,
                        timeLeft: isUpdatingScore ? timeLeft : (existingRecord.timeLeft || timeLeft),
                        isPlaying: !finished,
                        lastActive: Date.now(),
                        fullDate: dateToSave
                    });
                } else {
                    db.ref('rankings/rank_championship/' + loginId).update({
                        isPlaying: !finished,
                        lastActive: Date.now()
                    });
                }
            });

            if(finished) { 
                db.ref('approvedUsers/' + loginId).once('value', (snap) => {
                    const userData = snap.val() || {};
                    let currentGems = userData.gems || 0;
                    let currentCoins = userData.coins || 0;
                    let bestScores = userData.bestScores || {};
                    let oldBest = bestScores['암산챔피언'] || 0;

                    let earnedGems = Math.floor(totalScore / 10);
                    let earnedCoins = (totalScore > oldBest && totalScore > 0) ? 100 : 0;
                    let newBest = Math.max(oldBest, totalScore);

                    bestScores['암산챔피언'] = newBest;
                    
                    const logData = {
                        date: getFormattedDate(),
                        subject: "암산챔피언",
                        score: totalScore,
                        earnedGems: earnedGems,
                        earnedCoins: earnedCoins
                    };

                    db.ref('approvedUsers/' + loginId).update({
                        gems: currentGems + earnedGems,
                        coins: currentCoins + earnedCoins,
                        bestScores: bestScores,
                        lastActivity: new Date().toLocaleString()
                    }).then(() => {
                        db.ref('approvedUsers/' + loginId + '/practiceLogs').push(logData);
                        localStorage.setItem('userGems', currentGems + earnedGems);
                        localStorage.setItem('userCoins', currentCoins + earnedCoins);
                    });
                });
            }
            updateHallOfFame(); 
        }

        // 🌟 수정의 핵심: 어떤 불량 데이터가 들어와도 죽지 않는 방어 코드!
        function updateHallOfFame() {
            if (!firebase.apps.length) return;
            const db = firebase.database();
            
            db.ref('rankings/rank_championship').once('value').then(function(snapshot) {
                var data = snapshot.val();
                const hallOfFameEl = document.getElementById('hall-of-fame');
                
                // 데이터가 아예 없으면 안내 문구
                if (!data) {
                    if(hallOfFameEl) hallOfFameEl.innerHTML = `
                        <div style="text-align:center; color:#555; padding-top:20px; font-size:0.75rem;">
                            아직 등록된 챔피언이 없습니다.<br>첫 번째 챔피언이 되어보세요!
                        </div>`;
                    return;
                }

                // 🌟 강력한 방어막: 이름표가 없는 불량 데이터는 무시합니다.
                var ranks = Object.values(data).filter(r => typeof r === 'object' && r !== null && r.name);
                
                if (ranks.length === 0) return;

                // 점수 높은 순(1순위), 최근 플레이한 사람 먼저(2순위) 정렬
                ranks.sort((a, b) => (b.score || 0) - (a.score || 0) || (b.lastActive || 0) - (a.lastActive || 0));

                let html = ""; 
                const medals = ["🥇", "🥈", "🥉", "🏅", "🎖️"]; 
                const now = Date.now();

                const topPlayer = ranks.length > 0 ? (ranks[0].name || "") : "";
                if (topPlayerNameMemory && topPlayerNameMemory !== topPlayer && (ranks[0].score || 0) > 0) {
                    const notice = document.getElementById('reversal-notice');
                    if(notice) {
                        notice.style.display = 'block';
                        notice.style.animation = 'fade-up-notice 2.5s ease-in-out';
                        setTimeout(() => { notice.style.display = 'none'; notice.style.animation = ''; }, 2500);
                    }
                }
                topPlayerNameMemory = topPlayer;

                let denseRank = 1;
                for(let i = 0; i < ranks.length; i++) { 
                    let currScore = ranks[i].score || 0;
                    let prevScore = i > 0 ? (ranks[i-1].score || 0) : 0;
                    
                    if(i > 0 && currScore < prevScore) denseRank++;
                    
                    let displayRank = denseRank <= 5 ? denseRank : (i + 1);
                    
                    let r = ranks[i]; 
                    let rName = r.name || "이름없음";
                    
                    let isMeClass = (rName === playerName && playerName !== "") ? 'my-record' : '';
                    let rankColorClass = displayRank <= 5 ? displayRank : 'other';
                    let medalStr = displayRank <= 5 ? medals[displayRank - 1] : '';
                    
                    let isActiveRecently = (now - (r.lastActive || 0)) < 180000;
                    let playingClass = (r.isPlaying && isActiveRecently) ? 'is-playing' : '';
                    
                    let boltHtml = playingClass ? '<span class="bolt-icon">⚡</span>' : '';
                    
                    html += `<div class="rank-item color-${rankColorClass} ${isMeClass} ${playingClass}">
                                <span style="display:flex; align-items:center; gap:4px; overflow:hidden;">
                                    <span style="white-space:nowrap;">${medalStr}${displayRank}. ${rName}</span>
                                    ${boltHtml}
                                </span>
                                <span style="font-family:'Orbitron'; font-weight:900;">${currScore}</span>
                            </div>`; 
                } 
                if(hallOfFameEl) hallOfFameEl.innerHTML = html;
            }).catch(e => console.error(e));
        }

        function showFinalResult() { 
            saveRecord(true); 
            
            const msgArea = document.getElementById('schulte-msg');
            const spent = 480 - timeLeft;
            const m = Math.floor(spent/60);
            const s = spent%60;
            const timeDisplay = (timeLeft <= 0) ? "08:00 (Time Over)" : `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            
            const realNameOnly = playerName.replace(/[0-9]/g, ''); 
            const loginId = localStorage.getItem('loginId') || "guest_" + playerName;
            
            const db = firebase.database();

            db.ref('approvedUsers/' + loginId).once('value', (snap) => {
                const u = snap.val() || {};
                const oldBest = u.bestScores ? (u.bestScores['암산챔피언'] || 0) : 0;
                
                let earnedGems = Math.floor(totalScore / 10);
                let earnedCoins = (totalScore > oldBest && totalScore > 0) ? 100 : 0; 
                
                const isNewRecord = (totalScore > oldBest) && (totalScore > 0);
                const newRecordBanner = isNewRecord ? `
                    <div style="animation: popUpNewRecord 0.6s ease-out; margin: 5px 0 10px 0;">
                        <span style="background: linear-gradient(135deg, #ef4444, #f59e0b); color:white; padding: 6px 20px; border-radius: 20px; font-weight: 900; font-size: 1.1rem; box-shadow: 0 0 15px #ef4444; display: inline-block;">
                            🎉 신기록 달성! +100 💰 🎉
                        </span>
                    </div>
                ` : '';

                db.ref('rankings/rank_championship').once('value', (rankSnap) => {
                    const rankData = rankSnap.val() || {};
                    const ranks = Object.values(rankData).filter(r => r && r.name).sort((a,b) => (b.score || 0) - (a.score || 0) || (b.lastActive || 0) - (a.lastActive || 0));
                    
                    let myRank = "-";
                    let denseRank = 1;
                    let modalRanksHtml = "";
                    const medals = ["🏆 1위", "🥈 2위", "🥉 3위", "🏅 4위", "🎖️ 5위"]; 
                    
                    for(let i=0; i<ranks.length; i++) {
                        let currScore = ranks[i].score || 0;
                        let prevScore = i > 0 ? (ranks[i-1].score || 0) : 0;
                        if(i > 0 && currScore < prevScore) denseRank++;
                        
                        let mDisplayRank = denseRank <= 5 ? denseRank : (i + 1);
                        if((ranks[i].name || "") === playerName) myRank = mDisplayRank;
                        
                        let mMedal = mDisplayRank <= 5 ? medals[mDisplayRank-1] : mDisplayRank + '.';
                        
                        if(i < 15) { 
                            modalRanksHtml += `
                                <div class="history-item" style="grid-template-columns: 45px 1fr 1.2fr 40px; padding: 6px 4px;">
                                    <span style="color:var(--gold); font-weight:900;">${mMedal}</span>
                                    <span style="color:#fff; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${ranks[i].name || '이름없음'}</span>
                                    <span style="color:#888; font-size:0.6rem; text-align:center;">${ranks[i].fullDate || '-'}</span>
                                    <span style="text-align:right; font-weight:900; color:var(--green);">${currScore}</span>
                                </div>
                            `;
                        }
                    }

                    msgArea.innerHTML = `
                        <div class="result-card">
                            <h2 style="color:var(--green); margin:0 0 5px 0; font-size:1.1rem;">${realNameOnly}님 결과</h2>
                            <div style="font-size:1.1rem; color:var(--gold); font-weight:900; margin-bottom:5px;">최고 순위: ${myRank}위 (소요시간: ${timeDisplay})</div>
                            ${newRecordBanner}
                            <h1 style="font-size:3.5rem; margin:0 0 10px 0; color:white; text-shadow:0 0 15px var(--purple);">${totalScore}점</h1>
                            
                            <div style="background:rgba(74, 222, 128, 0.1); padding:8px; border-radius:10px; margin-bottom:10px; border:1px solid var(--green);">
                                <span style="font-size:0.8rem; color:var(--green);">이번 게임 보상:</span>
                                <span style="font-weight:900; margin-left:10px;">💎 ${earnedGems}  💰 ${earnedCoins}</span>
                            </div>

                            <div style="font-weight:900; color:var(--gold); font-size:0.8rem; margin-bottom:8px; border-bottom:1px solid #333; padding-bottom:5px; display:grid; grid-template-columns: 45px 1fr 1.2fr 40px; text-align:left;">
                                <span>순위</span><span>이름</span><span style="text-align:center;">달성일시</span><span style="text-align:right;">점수</span>
                            </div>
                            <div class="history-list">
                                ${modalRanksHtml}
                            </div>
                            <div style="display:flex; gap:10px; margin-top:15px;">
                                <button onclick="location.href='mainpage.html'" style="flex:1; padding:12px; background:#334155; color:white; border:none; font-weight:900; border-radius:10px; cursor:pointer; font-size:1rem;">메인화면</button>
                                <button onclick="location.reload()" style="flex:1; padding:12px; background:var(--green); color:black; border:none; font-weight:900; border-radius:10px; cursor:pointer; font-size:1rem; box-shadow:0 4px #2d8a50;">다시 도전하기</button>
                            </div>
                        </div>`; 
                    
                    document.getElementById('schulte-overlay').style.display='flex';
                    msgArea.style.display='flex';
                });
            });
        }

        function showPracticeLogs() { 
            const list = document.getElementById('my-log-list'); 
            const title = document.getElementById('course-title').innerText; 
            const loginId = localStorage.getItem('loginId');
            
            list.innerHTML = `<div style="text-align:center; color:#888; padding:20px;">데이터를 불러오는 중...</div>`;
            document.getElementById('history-popup').style.display = 'flex'; 

            const db = firebase.database();
            db.ref('approvedUsers/' + loginId + '/practiceLogs').once('value', (snap) => {
                const data = snap.val() || {};
                const logsArray = Object.values(data).filter(log => log.subject === "암산챔피언").reverse();

                let headerHtml = `
                    <div style="display:grid; grid-template-columns: 1.2fr 0.8fr 1fr; padding: 5px 8px; font-size: 0.6rem; color: #555; border-bottom: 1px solid #333;">
                        <span>연습일시</span><span style="text-align:center;">점수</span><span style="text-align:right;">획득보상</span>
                    </div>
                `;

                if (logsArray.length === 0) {
                    list.innerHTML = headerHtml + `<div style="text-align:center; padding:15px; color:#666; font-size:0.75rem;">아직 기록이 없습니다.</div>`;
                    return;
                }

                let listHtml = logsArray.map(l => {
                    return `
                    <div class="history-item" style="grid-template-columns: 1.2fr 0.8fr 1fr;">
                        <span class="log-date" style="font-size:0.6rem;">${l.date || "-"}</span>
                        <span class="log-score" style="text-align:center; font-size:0.75rem;">${l.score || 0}</span>
                        <span class="log-duration" style="color:var(--gold); text-align:right; font-size:0.65rem;">
                            <span style="color:#22d3ee">💎+${l.earnedGems || 0}</span> ${l.earnedCoins > 0 ? '<span style="color:#fbbf24">💰+'+l.earnedCoins+'</span>' : ''}
                        </span>
                    </div>`;
                }).join(''); 

                list.innerHTML = headerHtml + listHtml;
            });
        }

        window.addEventListener('keydown', (e) => { 
            if(busy || isTimeUp) return; 
            if(e.key >= '0' && e.key <= '9') fnIn(e.key); 
            else if(e.key === 'Enter') fnOk(); 
            else if(e.key === 'Backspace') fnIn('back'); 
            else if(e.key === 'Escape') fnIn('AC'); 
        });

        setInterval(updateHallOfFame, 3000);
    </script>
</body>
</html>
