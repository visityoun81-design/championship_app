    <style>
        :root {
            --bg: #0f172a; --panel: #1e293b; --purple: #c084fc;
            --gold: #facc15; --green: #4ade80; --red: #f87171; --blue: #3b82f6;

        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Noto Sans KR', sans-serif; padding: 10px; box-sizing: border-box; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid var(--purple); padding-bottom: 10px; }

        .btn { border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; font-size: 0.8rem; transition: 0.2s; }

        .btn-reset { background: #334155; font-size: 0.7rem; padding: 8px 4px; }
        
       input, select { 
    background: #020617; border: 1px solid #334155; color: white; padding: 10px; 
    border-radius: 8px; font-size: 0.85rem; outline: none; 
    width: 100%; /* 너비를 100%로 꽉 채우게 함 */
    box-sizing: border-box; /* 패딩 때문에 삐져나가지 않게 함 */
}
        
        .table-wrapper { width: 100%; overflow-x: auto; }

        .admin-table td { padding: 10px 5px; border-bottom: 1px solid rgba(255,255,255,0.05); }

/* 뱃지 전용 스타일 추가 */
        .m-badge-area {

    </style>
</head>

<script>
    // [2] Firebase 설정 (내일 설정값을 여기에 넣으세요)
  const firebaseConfig = {
    apiKey: "AIzaSyCbhFq8vcLem8DoMdlsXpC-ZRYELhJSFHU",
    authDomain: "championship-8f923.firebaseapp.com",
    databaseURL: "https://championship-8f923-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "championship-8f923",
    storageBucket: "championship-8f923.firebasestorage.app",
    messagingSenderId: "118704807417",
    appId: "1:118704807417:web:b1cacb9636d51a38d67128",
    measurementId: "G-KLHCC95R2C"
  }

    // [3] Firebase 연결 시작
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    var db = firebase.database();

    // [4] 변수 설정
    var loginName = localStorage.getItem('userName');
    var userRole = localStorage.getItem('userRole');
    var group1 = ['암산챔피언', '덧셈초급', '덧셈중급', '덧셈마스터', '10만들기', '24만들기', '슐태표'];
    var group2 = ['곱셈초급', '곱셈중급', '곱셈마스터', '나눗셈초급', '나눗셈중급', '나눗셈마스터'];

    // [5] 화면 초기화 (여기서 버튼들이 보이고 숨겨집니다)
    window.onload = function() {
        var regArea = document.getElementById('reg-type-select-area');
        var regTeacherSelect = document.getElementById('reg-teacher-select');
        var adminTop = document.getElementById('admin-only-top');
        var resetSec = document.getElementById('reset-section');

        if (userRole === 'admin') {
            if(adminTop) adminTop.style.display = 'block';
            if(resetSec) resetSec.style.display = 'block';
        } else {
            if(adminTop) adminTop.style.display = 'none';
            if(resetSec) resetSec.style.display = 'none';
            if(regArea) regArea.style.display = 'none';
            if(regTeacherSelect) {
                regTeacherSelect.innerHTML = '<option value="' + loginName + '">' + loginName + '</option>';
                regTeacherSelect.value = loginName;
            }
        }
        displayUserList(); // 리스트 실행
        loadJoinRequests(); // 승인요청 실행
    };

    // [6] 학생/선생님 목록 실시간 표시
    function displayUserList() {
        db.ref('approvedUsers').on('value', function(snapshot) {
            var usersObj = snapshot.val() || {};
            var users = [];
            for(var key in usersObj) {
                var u = usersObj[key];
                u.id = key;
                users.push(u);
            }

            var filterValue = document.getElementById('filter-teacher') ? document.getElementById('filter-teacher').value : 'all';
            var search = document.getElementById('search-input') ? document.getElementById('search-input').value.toLowerCase() : "";

            // 선생님 관리
            if (userRole === 'admin') {
                var teachers = users.filter(function(u) { return u.type === '선생님'; });
                document.getElementById('teacher-count').innerText = teachers.length + "명";
                document.getElementById('teacher-list-body').innerHTML = teachers.map(function(t) {
                    return '<tr><td><strong>' + t.name + '</strong><br>' + t.id + '</td><td>' + t.pw + '</td><td><button class="btn btn-delete btn-sm" onclick="deleteUser(\'' + t.id + '\')">삭제</button></td></tr>';
                }).join('');
            }

            // 학생 관리
            var students = users.filter(function(u) { return u.type === '학생'; });
            var filtered = students.filter(function(u) {
                var matchT = (userRole === 'admin') ? (filterValue === 'all' || u.teacher === filterValue) : (u.teacher === loginName);
                var matchS = u.name.toLowerCase().includes(search);
                return matchT && matchS;
            });

            document.getElementById('user-count').innerText = filtered.length + "명";
            document.getElementById('user-list-body').innerHTML = filtered.map(function(user) {
                return '<tr>' +
                    '<td><strong>' + user.name + '</strong><br>' + user.id + '</td>' +
                    '<td><button class="btn btn-blue btn-sm" onclick="showDetail(\'' + user.id + '\')">기록</button></td>' +
                    '<td>Lv.' + (user.level || 1) + '</td>' +
                    '<td style="color:#facc15">' + (user.teacher || '-') + '</td>' +
                    '<td><button class="btn btn-delete btn-sm" onclick="deleteUser(\'' + user.id + '\')">삭제</button></td>' +
                '</tr>';
            }).join('');
        });
    }

    // [7] 가입 승인 로직
    function loadJoinRequests() {
        db.ref('joinRequests').on('value', function(snapshot) {
            var data = snapshot.val();
            var list = document.getElementById('request-list');
            if(!list) return;
            if(!data) { list.innerHTML = "요청 없음"; return; }
            var html = "";
            for(var id in data) {
                html += '<div style="display:flex; justify-content:space-between; padding:8px; background:rgba(255,255,255,0.05); margin-bottom:5px; border-radius:8px;">' +
                        '<span>' + data[id].name + '(' + data[id].type + ')</span>' +
                        '<button class="btn btn-approve btn-sm" onclick="approveJoin(\'' + id + '\')">승인</button></div>';
            }
            list.innerHTML = html;
        });
    }

    function approveJoin(id) {
        db.ref('joinRequests/' + id).once('value').then(function(snapshot) {
            if (snapshot.exists()) {
                var userData = snapshot.val();
                userData.level=1; userData.gems=0; userData.coins=0; userData.bestScores={}; userData.badges=""; userData.practiceLogs=[];
                db.ref('approvedUsers/' + id).set(userData);
                db.ref('joinRequests/' + id).remove();
                alert("승인 완료!");
            }
        });
    }

    // [8] 초기화 버튼 (가장 중요한 부분)
    function resetRank(subject) {
        if(confirm(subject + "의 실시간 순위판을 초기화하시겠습니까?")) {
            var keyMap = { 
                '암산챔피언':'rank_championship', '덧셈초급':'rank_add_base', '덧셈중급':'rank_add_medium', 
                '덧셈마스터':'rank_add_master', '10만들기':'rank_make10', '24만들기':'rank_make24', '슐태표':'rank_schulte',
                '곱셈초급':'rank_mul_base', '곱셈중급':'rank_mul_medium', '곱셈마스터':'rank_mul_master',
                '나눗셈초급':'rank_div_base', '나눗셈중급':'rank_div_medium', '나눗셈마스터':'rank_div_master'
            };
            if(subject === '전체대회') {
                db.ref('rankings').remove().then(function() { alert("전체 초기화 완료"); });
            } else if(keyMap[subject]) {
                db.ref('rankings/' + keyMap[subject]).remove().then(function() { alert(subject + " 초기화 완료"); });
            }
        }
    }

    // [9] 기타 함수
    function directRegister() {
        var name = document.getElementById('reg-name').value;
        var id = document.getElementById('reg-id').value;
        var pw = document.getElementById('reg-pw').value;
        var type = document.getElementById('reg-type').value;
        var teacher = document.getElementById('reg-teacher-select').value;
        if (userRole !== 'admin') { type = "학생"; teacher = loginName; }
        if(!name || !id || !pw) return alert("정보를 모두 입력해주세요.");
        db.ref('approvedUsers/' + id).set({ name:name, id:id, pw:pw, type:type, teacher:teacher, level: 1, gems: 0, coins: 0, bestScores: {}, badges: "", practiceLogs: [] })
        .then(function() { alert("등록 완료!"); });
    }

    function deleteUser(id) { if(confirm("정말 삭제하시겠습니까?")) db.ref('approvedUsers/' + id).remove(); }
    
function showDetail(id) {
    db.ref('approvedUsers/' + id).once('value').then((snap) => {
        const u = snap.val();
        if (!u) return;

        // 1. 이름 및 기본 재화 표시
        document.getElementById('modal-user-name').innerText = `📊 ${u.name} 학생 리포트`;
        document.getElementById('m-gem').innerText = u.gems || 0;
        document.getElementById('m-coin').innerText = u.coins || 0;

        // 2. [추가] 뱃지 표시 로직
        const badgeList = u.myBadges || [];
        const badgeIcons = {
            'badge-add-1': '🥇', 'badge-add-2': '🏆', 'badge-add-3': '👑', // 덧셈 메달,트로피,왕관
            'badge-mul-1': '🥈', 'badge-mul-2': '💎', 'badge-mul-3': '🔮', // 곱셈 메달,트로피,마스터
            'badge-div-1': '🥉', 'badge-div-2': '🔱', 'badge-div-3': '🌌', // 나눗셈 메달,트로피,마스터
            'badge-fire': '🔥', 'badge-calendar': '🗓️', 'badge-perfect': '💯' // 특별 뱃지
        };
        
        let badgeHtml = badgeList.map(bId => `
            <span title="${bId}" style="font-size:24px; margin-right:5px;">${badgeIcons[bId] || '⭐'}</span>
        `).join('');
        
        // 만약 관리자 페이지 HTML에 뱃지를 넣을 공간(id="m-badges")이 없다면 하나 만드셔야 합니다.
        if(document.getElementById('m-badges')) {
            document.getElementById('m-badges').innerHTML = badgeHtml || "획득 뱃지 없음";
        }

        // 3. 최고 점수 카드 표시 (과목 리스트 업데이트)
        const subs = [
            '암산챔피언', '10만들기', '24만들기', '슐태표',
            '덧셈초급', '덧셈중급', '덧셈마스터',
            '곱셈초급', '곱셈중급', '곱셈마스터',
            '나눗셈초급', '나눗셈중급', '나눗셈마스터'
        ];
        const best = u.bestScores || {};
        let h = subs.map(s => `
            <div class="subject-card">
                <span>${s}</span>
                <span class="score-val">${best[s] !== undefined ? best[s] : '-'}</span>
            </div>
        `).join('');
        document.getElementById('col-1').innerHTML = h;

        // 4. [추가] 최근 연습 로그 표시 (데이터가 있을 경우)
        if(u.practiceLogs && document.getElementById('m-log-list')) {
            const logArray = Object.values(u.practiceLogs).reverse(); // 최신순
            let logHtml = logArray.slice(0, 10).map(log => `
                <div style="font-size:12px; border-bottom:1px solid #eee; padding:3px 0; display:flex; justify-content:space-between;">
                    <span>${log.date.split(' ')[0]} ${log.subject}</span>
                    <span style="font-weight:bold;">${log.score}점</span>
                </div>
            `).join('');
            document.getElementById('m-log-list').innerHTML = logHtml;
        }

        document.getElementById('record-modal').style.display = 'flex';
    });
}
    function closeModal() { document.getElementById('record-modal').style.display = 'none'; }
    window.onclick = function(e) { if (e.target == document.getElementById('record-modal')) closeModal(); }


function loadAllStudentRecords() {
    const displayArea = document.getElementById('admin-record-list');
    // 로딩 중일 때 디자인이 깨지지 않게 안내 문구만 살짝 띄웁니다.
    displayArea.innerHTML = "<p style='color:#a855f7; grid-column: 1/-1;'>기록을 불러오는 중입니다...</p>";

    // 서버의 'users' 방을 읽어옵니다.
    firebase.database().ref('users').once('value', function(snapshot) {
        const users = snapshot.val();
        
        if (!users) {
            displayArea.innerHTML = "<p style='color:#94a3b8; grid-column: 1/-1;'>아직 쌓인 기록이 없습니다. 아이들이 게임을 끝까지 완료해야 기록이 생깁니다.</p>";
            return;
        }

        let html = "";
        // 데이터를 하나씩 꺼내서 선생님의 디자인 바구니에 담습니다.
        for (let id in users) {
            const u = users[id];
            
            // 선생님이 만드신 디자인 그대로 유지 (수정 금지 영역)
            html += `
                <div class="student-record-card" style="background: rgba(0,0,0,0.3); border: 1px solid #a855f7; padding: 15px; border-radius: 12px; text-align: left;">
                    <div style="border-bottom: 1px solid rgba(168, 85, 247, 0.3); padding-bottom: 8px; margin-bottom: 10px;">
                        <strong style="font-size: 1.1rem; color: #d8b4fe;">${u.name || '이름없음'}</strong> 
                        <span style="font-size: 0.8rem; color: #94a3b8;">(${id})</span>
                    </div>
                    <div style="font-size: 0.9rem; color: #eee; line-height: 1.6;">
                        <div>💎 보석: <strong>${u.gems || 0}개</strong></div>
                        <div>🪙 코인: <strong>${u.coins || 0}원</strong></div>
                        <div>🏆 최고점: <strong>${u.bestScore || 0}점</strong></div>
                        <div style="color: #94a3b8; font-size: 0.8rem; margin-top: 5px;">📅 최근: ${u.lastDate || '-'}</div>
                    </div>
                </div>`;
        }
        displayArea.innerHTML = html;
    });
}




</script>
