    <style>
        body { 
            background: radial-gradient(circle at top, #1e1b4b, #020617); 
            color: white; font-family: 'Pretendard', 'Noto Sans KR', sans-serif; 
            display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh;
        }
        
        .info-card { 
            width: 100%; max-width: 700px; 
            background: rgba(30, 30, 63, 0.7); backdrop-filter: blur(20px);
            border: 2px solid rgba(168, 85, 247, 0.3); border-radius: 24px; 
            padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            text-align: center; box-sizing: border-box; 
        }

        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        
        .back-btn { 
            background: rgba(168, 85, 247, 0.15); border: 1.5px solid #a855f7; 
            color: #d8b4fe; padding: 8px 16px; border-radius: 12px; cursor: pointer; 
            font-size: 13px; font-weight: 900; transition: 0.2s;
        }
        .back-btn:hover { background: #a855f7; color: white; }

        .asset-info { font-size: 16px; color: #fbbf24; font-weight: 900; background: rgba(0,0,0,0.5); padding: 8px 20px; border-radius: 20px; border: 1px solid rgba(251, 191, 36, 0.3); }
        .asset-info span { color: white; }

        .tab-menu { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 20px; }
        .tab-btn { 
            flex: 1; padding: 14px 5px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); 
            background: rgba(255,255,255,0.05); color: #aaa; font-size: 14px; font-weight: 900; cursor: pointer; transition: 0.3s; 
        }
        .tab-btn.active { background: linear-gradient(135deg, #a855f7, #6366f1); color: white; border-color: #d8b4fe; box-shadow: 0 5px 15px rgba(168, 85, 247, 0.4); }

        .char-display-area { width: 100%; transition: 0.3s; }
        .char-display { 
            width: 100%; height: 280px; background: radial-gradient(circle at center, #3730a3, #1e1e3f); 
            border-radius: 20px; position: relative; overflow: hidden; border: 2px solid #6366f1; margin-bottom: 15px; box-shadow: inset 0 0 30px rgba(0,0,0,0.6);
        }
        .char-display img { position: absolute; transform: translate(-50%, -50%); object-fit: contain; display: none; }
        
        #wing { width: 90%; height: 90%; z-index: 1; top: 50%; left: 50%; }
        #cape { width: 65%; height: 65%; z-index: 2; top: 55%; left: 50%; }
        #character { width: 75%; height: 75%; z-index: 3; top: 50%; left: 50%; display: block; }
        #shield { width: 40%; height: 40%; z-index: 4; top: 60%; left: 20%; }
        #staff { width: 75%; height: 75%; z-index: 5; top: 50%; left: 80%; }
        #pet { width: 32%; height: 32%; z-index: 6; top: 80%; left: 80%; }

        .name-tag { font-size: 24px; font-weight: 900; margin-bottom: 15px; color: #fff; text-shadow: 0 0 10px #a855f7; }

        .section-card { background: rgba(0, 0, 0, 0.4); border-radius: 20px; padding: 20px; min-height: 400px; text-align: left; border: 1px solid rgba(255,255,255,0.05); }
        .tab-title { font-size: 15px; color: #d8b4fe; font-weight: 900; margin: 20px 0 12px; border-bottom: 2px solid rgba(168, 85, 247, 0.3); padding-bottom: 8px; }
        .tab-title:first-child { margin-top: 0; }
        
        .item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(65px, 1fr)); gap: 10px; }
        .item-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #ddd; 
            padding: 12px 2px; border-radius: 12px; cursor: pointer; font-size: 11px; font-weight: bold; text-align: center; transition: 0.2s; 
        }
        .item-btn:hover { background: rgba(255,255,255,0.1); }
        .item-btn.active { background: #a855f7; color: white; border-color: white; box-shadow: 0 0 10px #a855f7; }
        .item-btn.locked { color: #666; background: rgba(0,0,0,0.5); border-color: transparent; }

        .history-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .history-table th { color: #a855f7; border-bottom: 2px solid rgba(168, 85, 247, 0.3); padding: 12px 0; text-align: center; font-size: 12px; font-weight: 900; }
        .history-table th:nth-child(1) { width: 28%; } 
        .history-table td { padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; font-weight: bold; }

        .badge-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 12px; margin-bottom: 15px; }
        .badge-item { background: rgba(0,0,0,0.5); padding: 15px 5px; border-radius: 15px; text-align: center; border: 1px solid #333; opacity: 0.2; transition: 0.3s; }
        .badge-item.owned { opacity: 1; border: 2px solid #fbbf24; background: rgba(251, 191, 36, 0.15); box-shadow: inset 0 0 15px rgba(251, 191, 36, 0.1); }
        .badge-icon { font-size: 32px; display: block; margin-bottom: 6px; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5)); }
        .badge-name { font-size: 11px; color: #eee; font-weight: 900; white-space: nowrap; }

        .special-badge.owned { border-color: #ef4444; background: rgba(239, 68, 68, 0.15); box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }

        .fire-exchange-box, .calendar-exchange-box { 
            padding: 15px 20px; border-radius: 16px; 
            display: flex; justify-content: space-between; align-items: center; margin-top: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .fire-exchange-box { background: linear-gradient(135deg, #ef4444, #991b1b); border: 1px solid #fca5a5; }
        .calendar-exchange-box { background: linear-gradient(135deg, #d97706, #b45309); border: 1px solid #fcd34d; margin-bottom: 25px; }
        
        .fire-exchange-box span, .calendar-exchange-box span { font-size: 14px; font-weight: 900; color: white; }
        .exchange-btn { 
            background: white; color: #000; border: none; padding: 8px 15px; 
            border-radius: 10px; font-weight: 900; cursor: pointer; font-size: 12px; transition: 0.2s;
        }
        .exchange-btn:hover { transform: scale(1.05); }

        .badge-item.owned { position: relative; cursor: pointer; }
        .badge-item.owned:hover::after, .badge-item.owned:active::after {
            content: attr(data-date); 
            position: absolute; bottom: 115%; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.95); color: #4ade80; padding: 6px 12px; border-radius: 8px;
            font-size: 11px; font-weight: bold; white-space: nowrap; z-index: 100;
            border: 1px solid #4ade80; box-shadow: 0 4px 10px rgba(74, 222, 128, 0.3);
            pointer-events: none; animation: popUp 0.2s ease-out forwards;
        }
        @keyframes popUp { from { opacity: 0; transform: translate(-50%, 5px); } to { opacity: 1; transform: translate(-50%, 0); } }
        
        .admin-gift-row { background: rgba(168, 85, 247, 0.15); border-left: 4px solid #a855f7; }

        @media (min-width: 600px) {
            .info-card { padding: 35px; }
            .char-display { height: 350px; }
            .item-btn { font-size: 13px; padding: 15px 5px; }
            .history-table { font-size: 14px; }
            .history-table th { font-size: 14px; }
            .badge-name { font-size: 12px; }
        }
    </style>
</head>

    <script>
    // 🚨 파이어베이스 키를 꼭 넣어주세요!
  const firebaseConfig = {
    apiKey: "AIzaSyCbhFq8vcLem8DoMdlsXpC-ZRYELhJSFHU",
    authDomain: "championship-8f923.firebaseapp.com",
    projectId: "championship-8f923",
    storageBucket: "championship-8f923.firebasestorage.app",
    messagingSenderId: "118704807417",
    appId: "1:118704807417:web:b1cacb9636d51a38d67128",
    measurementId: "G-KLHCC95R2C"
  };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();
    
    // 데이터를 담을 바구니
    let gems = 0;
    let coins = 0;
    let fireballs = 0;
    let purchased = ["dog.png"];
    let myBadges = [];

    window.onload = function() {
        let myName = localStorage.getItem('userName') || "사용자";
        let userId = localStorage.getItem('loginId');
        
        // 🌟 마법의 동기화 코드 (빈 창고 방지!)
        if (!userId || userId === "null" || userId.trim() === "") {
            userId = "guest_" + myName;
        }

        document.getElementById('user-display-name').innerText = myName;

        // 서버 로딩 전 기기 저장값으로 0.1초만에 화면 채우기
        gems = parseInt(localStorage.getItem('userGems')) || 0;
        coins = parseInt(localStorage.getItem('userCoins')) || 0;
        document.getElementById('current-gems').innerText = gems;
        document.getElementById('current-coins').innerText = coins;
        
        loadLook();
        try {
            myBadges = JSON.parse(localStorage.getItem('myBadges') || "[]");
            refreshBadges(null);
        } catch(e) {}

        // 서버에서 내 진짜 기록 싹 다 긁어오기!
        db.ref('approvedUsers/' + userId).on('value', (snapshot) => {
            const userData = snapshot.val();
            if (userData) {
                gems = userData.gems || gems;
                coins = userData.coins || coins;
                fireballs = userData.fireballCount || 0;
                
                if (userData.purchasedItems) purchased = userData.purchasedItems;
                if (userData.myBadges) myBadges = userData.myBadges;

                localStorage.setItem('userGems', gems);
                localStorage.setItem('userCoins', coins);
                localStorage.setItem('myBadges', JSON.stringify(myBadges));

                updateUI();
                loadLook();
                refreshBadges(userData.practiceLogs);
                renderLogs(userData.practiceLogs); 
                
                document.getElementById('user-display-name').innerText = userData.name || myName;
            } else {
                renderLogs(null); // 진짜 최초 접속 시에만 빈 기록 표시
            }
        });
    };

    function updateUI() {
        document.getElementById('current-gems').innerText = gems;
        document.getElementById('current-coins').innerText = coins;
        document.getElementById('fireball-count').innerText = fireballs;

        document.querySelectorAll('.item-btn').forEach(btn => {
            const attr = btn.getAttribute('onclick');
            if (attr) {
                const file = attr.split("'")[3];
                if (purchased.includes(file)) {
                    btn.classList.remove('locked');
                    btn.innerText = btn.innerText.replace('❓ ', '');
                }
            }
        });
    }

    function buyOrApply(type, file, price, btn) {
        if (!purchased.includes(file)) {
            if (gems < price) return alert("보석이 부족해요! 💎");
            if (confirm(`보석 ${price}개를 사용하여 구매할까요?`)) {
                const newPurchased = [...purchased, file];
                
                const logData = {
                    date: new Date().toLocaleDateString(),
                    subject: "상점: 아이템 구매",
                    score: "-",
                    earnedGems: -price, 
                    earnedCoins: 0
                };

                let userId = localStorage.getItem('loginId') || "guest_" + (localStorage.getItem('userName') || "사용자");

                db.ref('approvedUsers/' + userId).update({
                    gems: gems - price,
                    purchasedItems: newPurchased
                }).then(() => {
                    db.ref('approvedUsers/' + userId + '/practiceLogs').push(logData).then(() => {
                        alert("구매 완료!");
                    });
                });
            }
        } else {
            const img = document.getElementById(type);
            if (img.style.display === 'block' && img.src.includes(file) && type !== 'character') {
                img.style.display = 'none';
                localStorage.removeItem('my' + type.charAt(0).toUpperCase() + type.slice(1));
                btn.classList.remove('active');
            } else {
                img.src = file;
                img.style.display = 'block';
                btn.parentElement.querySelectorAll('.item-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                localStorage.setItem('my' + type.charAt(0).toUpperCase() + type.slice(1), file);
            }
        }
    }

    function exchangeFireball() {
        if (fireballs <= 0) return alert("교환할 파이어볼이 없어요! 🔥");
        if (confirm("파이어볼 1개를 보석 30개로 교환할까요?")) {
            const logData = {
                date: new Date().toLocaleDateString(),
                subject: "상점: 파이어볼 교환",
                score: "-",
                earnedGems: 30,
                earnedCoins: 0
            };
            let userId = localStorage.getItem('loginId') || "guest_" + (localStorage.getItem('userName') || "사용자");
            db.ref('approvedUsers/' + userId).update({ fireballCount: fireballs - 1, gems: gems + 30 }).then(() => {
                db.ref('approvedUsers/' + userId + '/practiceLogs').push(logData).then(() => alert("교환 완료! 보석 30개를 얻었습니다. 💎"));
            });
        }
    }

    function exchangeCalendar() {
        if (!myBadges.includes('badge-calendar')) return alert("30일 황금달력 뱃지를 아직 획득하지 못했어요! 🗓️");
        if (confirm("황금달력 뱃지를 보석 100개로 교환할까요?\n(주의: 교환 시 뱃지는 인벤토리에서 사라집니다!)")) {
            const logData = {
                date: new Date().toLocaleDateString(),
                subject: "상점: 황금달력 교환",
                score: "-",
                earnedGems: 100,
                earnedCoins: 0
            };
            const newBadges = myBadges.filter(b => b !== 'badge-calendar');
            let userId = localStorage.getItem('loginId') || "guest_" + (localStorage.getItem('userName') || "사용자");
            db.ref('approvedUsers/' + userId).update({ myBadges: newBadges, gems: gems + 100 }).then(() => {
                db.ref('approvedUsers/' + userId + '/practiceLogs').push(logData).then(() => alert("교환 완료! 보석 100개를 얻었습니다. 💎"));
            });
        }
    }

    function loadLook() {
        ['Character','Wing','Cape','Shield','Staff','Pet'].forEach(t => {
            const saved = localStorage.getItem('my' + t);
            if (saved) {
                const el = document.getElementById(t.toLowerCase());
                if(el) { el.src = saved; el.style.display = 'block'; }
                document.querySelectorAll('.item-btn').forEach(btn => {
                    if (btn.getAttribute('onclick') && btn.getAttribute('onclick').includes(`'${saved}'`)) btn.classList.add('active');
                });
            }
        });
    }

    function renderLogs(logsObj) {
        const body = document.getElementById('study-logs-body');
        if (!logsObj) {
            body.innerHTML = "<tr><td colspan='5' style='padding:20px; color:#888;'>공부 기록이 없습니다.</td></tr>";
            return;
        }
        
        const logs = Object.values(logsObj).reverse();
        body.innerHTML = logs.map(log => {
            if (log.subject && log.subject.includes("상점")) {
                return `<tr class="admin-gift-row">
                            <td style="font-size:10px; color:#aaa;">${log.date || '-'}</td>
                            <td colspan="2" style="color:#d8b4fe; font-weight:900;">🛒 ${log.subject}</td>
                            <td style="color:#22d3ee; font-weight:900;">${log.earnedGems > 0 ? '+' + log.earnedGems : log.earnedGems}</td>
                            <td style="color:#fbbf24; font-weight:900;">-</td>
                        </tr>`;
            }
            if (log.subject && log.subject.includes("선물")) {
                return `<tr class="admin-gift-row">
                            <td style="font-size:10px; color:#aaa;">${log.date || '-'}</td>
                            <td colspan="2" style="color:#d8b4fe; font-weight:900;">🎁 ${log.subject}</td>
                            <td style="color:#22d3ee; font-weight:900;">${log.earnedGems ? '+' + log.earnedGems : ''}</td>
                            <td style="color:#fbbf24; font-weight:900;">${log.earnedCoins ? '+' + log.earnedCoins : ''}</td>
                        </tr>`;
            }
            return `<tr>
                        <td style="font-size:10px; color:#aaa;">${log.date || '-'}</td>
                        <td>${log.subject || '-'}</td>
                        <td style="color:#fff;">${log.score || 0}점</td>
                        <td style="color:#22d3ee">+${log.earnedGems || 0}</td>
                        <td style="color:#fbbf24">${log.earnedCoins > 0 ? '+'+log.earnedCoins : '-'}</td>
                    </tr>`;
        }).join('');
    }

    function refreshBadges(logsObj) {
        document.querySelectorAll('.badge-item').forEach(el => {
            el.classList.remove('owned'); el.removeAttribute('data-date');
        });

        let latestDate = "✨ 획득 완료 ✨";
        if (logsObj) {
            const logsArray = Object.values(logsObj);
            if(logsArray.length > 0 && logsArray[logsArray.length - 1].date) {
                latestDate = "최근 접속: " + logsArray[logsArray.length - 1].date.split(' ')[0];
            }
        }

        myBadges.forEach(id => {
            const el = document.getElementById(id);
            if (el) { el.classList.add('owned'); el.setAttribute('data-date', latestDate); }
        });
    }

    function openTab(evt, tabName) {
        document.querySelectorAll(".content-section").forEach(s => s.style.display = "none");
        document.querySelectorAll(".tab-btn").forEach(t => t.classList.remove("active"));
        document.getElementById('character-section').style.display = (tabName === 'decor') ? 'block' : 'none';
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.classList.add("active");
    }
    </script>
</body>
</html>
