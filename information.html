<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHAMPIONSHIP - MY INFO</title>
    <style>
        body { background-color: #12122b; color: white; font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .info-card { width: 100%; max-width: 420px; background: #1e1e3f; border-radius: 30px; padding: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); text-align: center; box-sizing: border-box; }

        .tab-menu { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px 2px; border-radius: 15px; border: none; background: #2d2d5a; color: #aaa; font-size: 13px; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: #a855f7; color: white; }

        .char-display-area { width: 100%; transition: 0.3s; }
        .char-display { 
            width: 100%; height: 260px; background: radial-gradient(circle, #2a2a5a, #1e1e3f); 
            border-radius: 20px; position: relative; overflow: hidden; border: 1.5px solid #a855f7; margin-bottom: 10px;
        }
        .char-display img { position: absolute; transform: translate(-50%, -50%); object-fit: contain; display: none; }
        
        #wing { width: 90%; height: 90%; z-index: 1; top: 50%; left: 50%; }
        #cape { width: 65%; height: 65%; z-index: 2; top: 55%; left: 50%; }
        #character { width: 75%; height: 75%; z-index: 3; top: 50%; left: 50%; display: block; }
        #shield { width: 40%; height: 40%; z-index: 4; top: 60%; left: 20%; }
        #staff { width: 75%; height: 75%; z-index: 5; top: 50%; left: 80%; }
        #pet { width: 32%; height: 32%; z-index: 6; top: 80%; left: 80%; }

        .name-tag { font-size: 20px; font-weight: bold; margin-bottom: 15px; color: #d8b4fe; }
        .asset-info { font-size: 14px; color: #fbbf24; margin-bottom: 15px; background: rgba(0,0,0,0.3); padding: 8px 15px; border-radius: 20px; display: inline-block; }

        .section-card { background: #25254d; border-radius: 20px; padding: 15px; min-height: 400px; text-align: left; }
        .tab-title { font-size: 13px; color: #a855f7; font-weight: bold; margin: 15px 0 8px; border-bottom: 1px solid #3d3d7a; padding-bottom: 5px; }
        
        .item-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .item-btn { background: #1e1e3f; border: 1px solid #3d3d7a; color: #ccc; padding: 10px 2px; border-radius: 12px; cursor: pointer; font-size: 10px; text-align: center; }
        .item-btn.active { background: #a855f7; color: white; border-color: white; box-shadow: 0 0 8px #a855f7; }
        .item-btn.locked { color: #555; background: rgba(0,0,0,0.2); }

        .history-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .history-table th { color: #888; border-bottom: 1px solid #3d3d7a; padding: 8px 0; text-align: center; }
        .history-table td { padding: 10px 0; border-bottom: 1px solid #1e1e3f; text-align: center; }

        .badge-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .badge-item { background: #1e1e3f; padding: 10px 5px; border-radius: 15px; text-align: center; border: 1px solid #333; opacity: 0.15; transition: 0.3s; }
        .badge-item.owned { opacity: 1; border: 1.5px solid #fbbf24; background: rgba(251, 191, 36, 0.1); }
        .badge-icon { font-size: 26px; display: block; margin-bottom: 4px; }
        .badge-name { font-size: 9px; color: #eee; font-weight: bold; white-space: nowrap; }

        .special-badge.owned { border-color: #ef4444; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }

        .fire-exchange-box { 
            background: linear-gradient(135deg, #ef4444, #991b1b); 
            color: white; padding: 12px; border-radius: 15px; 
            display: flex; justify-content: space-between; align-items: center; margin-top: 15px;
        }
        .fire-exchange-box span { font-size: 13px; font-weight: bold; }
        .fire-exchange-box button { 
            background: white; color: #ef4444; border: none; padding: 5px 12px; 
            border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 11px;
        }
    </style>
</head>
<body>

    <div class="info-card">
        <div style="text-align: left; margin-bottom: 10px;">
            <button onclick="location.href='mainpage.html'" style="background:none; border: 1px solid #a855f7; color:#a855f7; padding: 5px 15px; border-radius: 10px; cursor: pointer; font-size: 12px; font-weight: bold;">◀ 로비</button>
        </div>

        <div class="asset-info">💎 <span id="current-gems">0</span> | 🪙 <span id="current-coins">0</span></div>

        <div class="tab-menu">
            <button class="tab-btn active" onclick="openTab(event, 'decor')">꾸미기</button>
            <button class="tab-btn" onclick="openTab(event, 'study')">공부기록</button>
            <button class="tab-btn" onclick="openTab(event, 'badge')">명예뱃지</button>
        </div>

        <div id="character-section" class="char-display-area">
            <div class="char-display">
                <img id="wing" src=""><img id="cape" src=""><img id="character" src="dog.png">
                <img id="shield" src=""><img id="staff" src=""><img id="pet" src="">
            </div>
            <div class="name-tag"><span id="user-display-name">마법사</span></div>
        </div>

        <div id="decor" class="content-section">
            <div class="section-card">
                <div class="tab-title">🐾 동물 친구들 (100💎)</div>
                <div class="item-grid">
                    <button class="item-btn active" onclick="buyOrApply('character', 'dog.png', 0, this)">강아지</button>
                    <button class="item-btn locked" onclick="buyOrApply('character', 'cat.png', 100, this)">❓ 고양이</button>
                    <button class="item-btn locked" onclick="buyOrApply('character', 'bear.png', 100, this)">❓ 곰돌이</button>
                    <button class="item-btn locked" onclick="buyOrApply('character', 'rabbit.png', 100, this)">❓ 토끼</button>
                    <button class="item-btn locked" onclick="buyOrApply('character', 'penguin.png', 100, this)">❓ 펭귄</button>
                    <button class="item-btn locked" onclick="buyOrApply('character', 'frog.png', 100, this)">❓ 개구리</button>
                    <button class="item-btn locked" onclick="buyOrApply('character', 'pig.png', 100, this)">❓ 돼지</button>
                    <button class="item-btn locked" onclick="buyOrApply('character', 'chick.png', 100, this)">❓ 병아리</button>
                    <button class="item-btn locked" onclick="buyOrApply('character', 'baby_dragon.png', 100, this)">❓ 아기용</button>
                    <button class="item-btn locked" onclick="buyOrApply('character', 'elephant.png', 100, this)">❓ 코끼리</button>
                </div>

                <div class="tab-title">⚔️ 전설의 장비 (100💎)</div>
                <div class="item-grid">
                    <button class="item-btn locked" onclick="buyOrApply('staff', 'staff.png', 100, this)">❓ 지팡이</button>
                    <button class="item-btn locked" onclick="buyOrApply('shield', 'shield.png', 100, this)">❓ 방패</button>
                    <button class="item-btn locked" onclick="buyOrApply('cape', 'cape.png', 100, this)">❓ 망또</button>
                    <button class="item-btn locked" onclick="buyOrApply('wing', 'wing_gold.png', 100, this)">❓ 황금날개</button>
                </div>

                <div class="tab-title">👾 펫 슬라임 (100💎)</div>
                <div class="item-grid">
                    <button class="item-btn locked" onclick="buyOrApply('pet', 'slime_blue.png', 100, this)">❓ 파란</button>
                    <button class="item-btn locked" onclick="buyOrApply('pet', 'slime_pink.png', 100, this)">❓ 분홍</button>
                    <button class="item-btn locked" onclick="buyOrApply('pet', 'slime_yellow.png', 100, this)">❓ 노랑</button>
                    <button class="item-btn locked" onclick="buyOrApply('pet', 'slime_green.png', 100, this)">❓ 초록</button>
                </div>
            </div>
        </div>

        <div id="study" class="content-section" style="display:none;">
            <div class="section-card">
                <div class="tab-title">📊 최근 연습 내역</div>
                <table class="history-table">
                    <thead><tr><th>날짜</th><th>과목</th><th>점수</th><th>보석</th></tr></thead>
                    <tbody id="study-logs-body"></tbody>
                </table>
            </div>
        </div>

        <div id="badge" class="content-section" style="display:none;">
            <div class="section-card">
                <div class="tab-title">🔥 특별 챌린지</div>
                <div class="badge-grid">
                    <div class="badge-item special-badge" id="badge-fire"><span class="badge-icon">🔥</span><span class="badge-name">7일 파이어볼</span></div>
                    <div class="badge-item special-badge" id="badge-calendar"><span class="badge-icon">🗓️</span><span class="badge-name">30일 황금달력</span></div>
                    <div class="badge-item" id="badge-perfect"><span class="badge-icon">💯</span><span class="badge-name">완벽한 마법사</span></div>
                </div>

                <div class="fire-exchange-box">
                    <span>🔥 보유 파이어볼: <span id="fireball-count">0</span>개</span>
                    <button onclick="exchangeFireball()">보석 교환 (1개=30💎)</button>
                </div>

                <div class="tab-title">➕ 덧셈 정복</div>
                <div class="badge-grid">
                    <div class="badge-item" id="badge-add-1"><span class="badge-icon">🥇</span><span class="badge-name">덧셈 메달</span></div>
                    <div class="badge-item" id="badge-add-2"><span class="badge-icon">🏆</span><span class="badge-name">덧셈 트로피</span></div>
                    <div class="badge-item" id="badge-add-3"><span class="badge-icon">👑</span><span class="badge-name">덧셈 왕관</span></div>
                </div>

                <div class="tab-title">✖️ 곱셈 정복</div>
                <div class="badge-grid">
                    <div class="badge-item" id="badge-mul-1"><span class="badge-icon">🥈</span><span class="badge-name">곱셈 메달</span></div>
                    <div class="badge-item" id="badge-mul-2"><span class="badge-icon">💎</span><span class="badge-name">곱셈 트로피</span></div>
                    <div class="badge-item" id="badge-mul-3"><span class="badge-icon">🔮</span><span class="badge-name">곱셈 마스터</span></div>
                </div>

                <div class="tab-title">➗ 나눗셈 정복</div>
                <div class="badge-grid">
                    <div class="badge-item" id="badge-div-1"><span class="badge-icon">🥉</span><span class="badge-name">나눗셈 메달</span></div>
                    <div class="badge-item" id="badge-div-2"><span class="badge-icon">🔱</span><span class="badge-name">나눗셈 트로피</span></div>
                    <div class="badge-item" id="badge-div-3"><span class="badge-icon">🌌</span><span class="badge-name">나눗셈 마스터</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let gems = parseInt(localStorage.getItem('userGems') || "0");
        let coins = parseInt(localStorage.getItem('userCoins') || "0");
        let fireballs = parseInt(localStorage.getItem('fireballCount') || "0");
        let purchased = JSON.parse(localStorage.getItem('purchasedItems') || '["dog.png"]');
        let myBadges = JSON.parse(localStorage.getItem('myBadges') || '[]');

        window.onload = function() {
            document.getElementById('user-display-name').innerText = localStorage.getItem('userName') || "윤석화";
            updateUI();
            loadLook();
            refreshBadges();
            renderLogs();
        };

        function updateUI() {
            document.getElementById('current-gems').innerText = gems;
            document.getElementById('current-coins').innerText = coins;
            document.getElementById('fireball-count').innerText = fireballs;
            document.querySelectorAll('.item-btn').forEach(btn => {
                const attr = btn.getAttribute('onclick');
                if (attr) {
                    const file = attr.split("'")[3];
                    if (purchased.includes(file)) {
                        btn.classList.remove('locked');
                        btn.innerText = btn.innerText.replace('❓ ', '');
                    }
                }
            });
        }

        function exchangeFireball() {
            if (fireballs <= 0) return alert("교환할 파이어볼이 없어요! 🔥");
            if (confirm("파이어볼 1개를 보석 30개로 교환할까요?")) {
                fireballs -= 1;
                gems += 30;
                localStorage.setItem('fireballCount', fireballs);
                localStorage.setItem('userGems', gems);
                updateUI();
                alert("💎 보석 30개를 획득했습니다!");
            }
        }

        function openTab(evt, tabName) {
            document.querySelectorAll(".content-section").forEach(s => s.style.display = "none");
            document.querySelectorAll(".tab-btn").forEach(t => t.classList.remove("active"));
            document.getElementById('character-section').style.display = (tabName === 'decor') ? 'block' : 'none';
            document.getElementById(tabName).style.display = "block";
            evt.currentTarget.classList.add("active");
            if(tabName === 'study') renderLogs();
        }

        function buyOrApply(type, file, price, btn) {
            if (!purchased.includes(file)) {
                if (gems < price) return alert("보석이 부족해요! 💎");
                if (confirm(`보석 ${price}개를 사용하여 구매할까요?`)) {
                    gems -= price;
                    purchased.push(file);
                    localStorage.setItem('userGems', gems);
                    localStorage.setItem('purchasedItems', JSON.stringify(purchased));
                    updateUI();
                } else return;
            }
            const img = document.getElementById(type);
            if (img.style.display === 'block' && img.src.includes(file) && type !== 'character') {
                img.style.display = 'none';
                localStorage.removeItem('my' + type.charAt(0).toUpperCase() + type.slice(1));
                btn.classList.remove('active');
            } else {
                img.src = file;
                img.style.display = 'block';
                btn.parentElement.querySelectorAll('.item-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                localStorage.setItem('my' + type.charAt(0).toUpperCase() + type.slice(1), file);
            }
        }

        function loadLook() {
            ['Character','Wing','Cape','Shield','Staff','Pet'].forEach(t => {
                const saved = localStorage.getItem('my' + t);
                if (saved) {
                    const el = document.getElementById(t.toLowerCase());
                    el.src = saved; el.style.display = 'block';
                    document.querySelectorAll('.item-btn').forEach(btn => {
                        if (btn.getAttribute('onclick') && btn.getAttribute('onclick').includes(`'${saved}'`)) btn.classList.add('active');
                    });
                }
            });
        }

        function renderLogs() {
            const logs = JSON.parse(localStorage.getItem('practiceLogs') || "[]").reverse();
            const body = document.getElementById('study-logs-body');
            if (logs.length === 0) {
                body.innerHTML = "<tr><td colspan='4' style='padding:20px; color:#666;'>공부 기록이 없습니다.</td></tr>";
                return;
            }
            body.innerHTML = logs.slice(0, 15).map(log => `
                <tr>
                    <td>${log.date ? log.date.split(' ')[0].slice(5) : '-'}</td>
                    <td>${log.subject || '-'}</td>
                    <td>${log.score || 0}</td>
                    <td style="color:#fbbf24">+${log.earnedGems || 0}</td>
                </tr>
            `).join('');
        }

        function refreshBadges() {
            myBadges.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.classList.add('owned');
            });
        }
    </script>
</body>
</html>
