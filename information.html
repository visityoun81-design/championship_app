    <style>
        body { background-color: #12122b; color: white; font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .info-card { width: 100%; max-width: 420px; background: #1e1e3f; border-radius: 30px; padding: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); text-align: center; box-sizing: border-box; }

        .tab-menu { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px 2px; border-radius: 15px; border: none; background: #2d2d5a; color: #aaa; font-size: 13px; font-weight: bold; cursor: pointer; }

        .char-display-area { width: 100%; transition: 0.3s; }
        .char-display { 
            width: 100%; height: 260px; background: radial-gradient(circle, #2a2a5a, #1e1e3f); 
            border-radius: 20px; position: relative; overflow: hidden; border: 1.5px solid #a855f7; margin-bottom: 10px;
        }

        #wing { width: 90%; height: 90%; z-index: 1; top: 50%; left: 50%; }

        #shield { width: 40%; height: 40%; z-index: 4; top: 60%; left: 20%; }
        #staff { width: 75%; height: 75%; z-index: 5; top: 50%; left: 80%; }
        #pet { width: 32%; height: 32%; z-index: 6; top: 80%; left: 80%; }

        .asset-info { font-size: 14px; color: #fbbf24; margin-bottom: 15px; background: rgba(0,0,0,0.3); padding: 8px 15px; border-radius: 20px; display: inline-block; }

        .section-card { background: #25254d; border-radius: 20px; padding: 15px; min-height: 400px; text-align: left; }
        .tab-title { font-size: 13px; color: #a855f7; font-weight: bold; margin: 15px 0 8px; border-bottom: 1px solid #3d3d7a; padding-bottom: 5px; }
        
        .item-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .item-btn { background: #1e1e3f; border: 1px solid #3d3d7a; color: #ccc; padding: 10px 2px; border-radius: 12px; cursor: pointer; font-size: 10px; text-align: center; }
        .item-btn.active { background: #a855f7; color: white; border-color: white; box-shadow: 0 0 8px #a855f7; }
        .item-btn.locked { color: #555; background: rgba(0,0,0,0.2); }

        .history-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .history-table th { color: #888; border-bottom: 1px solid #3d3d7a; padding: 8px 0; text-align: center; }
        .history-table td { padding: 10px 0; border-bottom: 1px solid #1e1e3f; text-align: center; }

        .badge-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .badge-item { background: #1e1e3f; padding: 10px 5px; border-radius: 15px; text-align: center; border: 1px solid #333; opacity: 0.15; transition: 0.3s; }
        .badge-item.owned { opacity: 1; border: 1.5px solid #fbbf24; background: rgba(251, 191, 36, 0.1); }
        .badge-icon { font-size: 26px; display: block; margin-bottom: 4px; }
        .badge-name { font-size: 9px; color: #eee; font-weight: bold; white-space: nowrap; }

        .special-badge.owned { border-color: #ef4444; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }

        .fire-exchange-box { 
            background: linear-gradient(135deg, #ef4444, #991b1b); 
            color: white; padding: 12px; border-radius: 15px; 
            display: flex; justify-content: space-between; align-items: center; margin-top: 15px;
        }
        .fire-exchange-box span { font-size: 13px; font-weight: bold; }
        .fire-exchange-box button { 
            background: white; color: #ef4444; border: none; padding: 5px 12px; 
            border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 11px;
        }

/* 🌟 추가된 스타일: 공부기록 테이블 코인 폭 조정 */
        .history-table th:nth-child(1) { width: 30%; } /* 날짜 칸 넓게 */
        .history-table th { font-size: 10px; }

        /* 🌟 추가된 스타일: 뱃지 말풍선(툴팁) 효과 */
        .badge-item.owned { position: relative; cursor: pointer; }
        .badge-item.owned:hover::after,
        .badge-item.owned:active::after {
            content: attr(data-date); /* 자바스크립트가 넣어줄 글자 */
            position: absolute;
            bottom: 115%; left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: #4ade80; /* 밝은 초록색 */
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: bold;
            white-space: nowrap;
            z-index: 100;
            border: 1px solid #4ade80;
            box-shadow: 0 4px 10px rgba(74, 222, 128, 0.3);
            pointer-events: none; /* 마우스 간섭 방지 */
            animation: popUp 0.2s ease-out forwards;
        }
        @keyframes popUp {
            from { opacity: 0; transform: translate(-50%, 5px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }
        /* 관리자 선물용 하이라이트 행 */
        .admin-gift-row { background: rgba(168, 85, 247, 0.15); border-left: 3px solid #a855f7; }


    </style>

    <script>


    // Firebase 설정 및 초기화
    const firebaseConfig = {
    apiKey: "AIzaSyCbhFq8vcLem8DoMdlsXpC-ZRYELhJSFHU",
    authDomain: "championship-8f923.firebaseapp.com",
    databaseURL: "https://championship-8f923-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "championship-8f923",
    storageBucket: "championship-8f923.firebasestorage.app",
    messagingSenderId: "118704807417",
    appId: "1:118704807417:web:b1cacb9636d51a38d67128",
    measurementId: "G-KLHCC95R2C"
  };

// Firebase 초기화 (중복 방지)
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }



  const db = firebase.database();
    const userId = localStorage.getItem('loginId'); // 로그인된 아이디

    // 데이터를 담을 바구니 (전역 변수)
    let gems = 0;
    let coins = 0;
    let fireballs = 0;
    let purchased = ["dog.png"];
    let myBadges = [];

    // [핵심] 페이지 로드 시 실시간 데이터 연결
    window.onload = function() {
        if (!userId) {
            alert("로그인 정보가 없습니다. 다시 로그인 해주세요.");
            location.href = "index.html";
            return;
        }

        // 서버에서 내 정보를 실시간으로 감시 (onValue)
        db.ref('approvedUsers/' + userId).on('value', (snapshot) => {
            const userData = snapshot.val();
            if (userData) {
                gems = userData.gems || 0;
                coins = userData.coins || 0;
                fireballs = userData.fireballCount || 0;
                purchased = userData.purchasedItems || ["dog.png"];
                myBadges = userData.myBadges || [];

                updateUI();
                loadLook();
                renderLogs(userData.practiceLogs); // 공부 기록 출력 (코인 포함)
                refreshBadges(userData.practiceLogs); // 뱃지에 날짜 정보 넘겨주기
                
                document.getElementById('user-display-name').innerText = userData.name || "마법사";
            }
        });
    };

    // UI 숫자 업데이트
    function updateUI() {
        document.getElementById('current-gems').innerText = gems;
        document.getElementById('current-coins').innerText = coins;
        document.getElementById('fireball-count').innerText = fireballs;

        // 아이템 버튼 상태 업데이트 (구매한 것은 ❓ 제거)
        document.querySelectorAll('.item-btn').forEach(btn => {
            const attr = btn.getAttribute('onclick');
            if (attr) {
                const file = attr.split("'")[3];
                if (purchased.includes(file)) {
                    btn.classList.remove('locked');
                    btn.innerText = btn.innerText.replace('❓ ', '');
                }
            }
        });
    }

    // 아이템 구매 또는 착용
   // 🌟 [수정됨] 아이템 구매 또는 착용 (구매 시 기록 남기기)
    function buyOrApply(type, file, price, btn) {
        if (!purchased.includes(file)) {
            // 미구매 아이템인 경우
            if (gems < price) return alert("보석이 부족해요! 💎");
            if (confirm(`보석 ${price}개를 사용하여 구매할까요?`)) {
                const newPurchased = [...purchased, file];
                
                // 📝 [기록 데이터 생성] 상점 구매 내역
                const logData = {
                    date: new Date().toLocaleDateString(),
                    subject: "상점: 아이템 구매",
                    score: "-",
                    earnedGems: -price, // 차감은 마이너스 기호!
                    earnedCoins: 0
                };

                db.ref('approvedUsers/' + userId).update({
                    gems: gems - price,
                    purchasedItems: newPurchased
                }).then(() => {
                    // 서버에 기록 한 줄 추가!
                    db.ref('approvedUsers/' + userId + '/practiceLogs').push(logData).then(() => {
                        alert("구매 완료!");
                    });
                });
            }
        } else {
            // 이미 구매한 아이템인 경우 착용 로직 (기존과 동일)
            const img = document.getElementById(type);
            if (img.style.display === 'block' && img.src.includes(file) && type !== 'character') {
                img.style.display = 'none';
                localStorage.removeItem('my' + type.charAt(0).toUpperCase() + type.slice(1));
                btn.classList.remove('active');
            } else {
                img.src = file;
                img.style.display = 'block';
                btn.parentElement.querySelectorAll('.item-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                localStorage.setItem('my' + type.charAt(0).toUpperCase() + type.slice(1), file);
            }
        }
    }

    // 🌟 [수정됨] 파이어볼 교환 (교환 시 기록 남기기)
    function exchangeFireball() {
        if (fireballs <= 0) return alert("교환할 파이어볼이 없어요! 🔥");
        if (confirm("파이어볼 1개를 보석 30개로 교환할까요?")) {
            
            // 📝 [기록 데이터 생성] 파이어볼 교환 내역
            const logData = {
                date: new Date().toLocaleDateString(),
                subject: "상점: 파이어볼 ↔ 보석 교환",
                score: "-",
                earnedGems: 30, // 30개 획득!
                earnedCoins: 0
            };

            db.ref('approvedUsers/' + userId).update({
                fireballCount: fireballs - 1,
                gems: gems + 30
            }).then(() => {
                // 서버에 기록 한 줄 추가!
                db.ref('approvedUsers/' + userId + '/practiceLogs').push(logData).then(() => {
                    alert("교환 완료!");
                });
            });
        }
    }

    // 저장된 외형 불러오기
    function loadLook() {
        ['Character','Wing','Cape','Shield','Staff','Pet'].forEach(t => {
            const saved = localStorage.getItem('my' + t);
            if (saved) {
                const el = document.getElementById(t.toLowerCase());
                if(el) {
                    el.src = saved; 
                    el.style.display = 'block';
                }
                // 버튼에 불 켜기
                document.querySelectorAll('.item-btn').forEach(btn => {
                    if (btn.getAttribute('onclick') && btn.getAttribute('onclick').includes(`'${saved}'`)) {
                        btn.classList.add('active');
                    }
                });
            }
        });
    }

    

    // 🌟 [수정] 공부 기록 렌더링 (보석, 코인, 관리자 선물 처리)
    function renderLogs(logsObj) {
        const body = document.getElementById('study-logs-body');
        if (!logsObj) {
            body.innerHTML = "<tr><td colspan='5' style='padding:20px; color:#666;'>공부 기록이 없습니다.</td></tr>";
            return;
        }
        
        const logs = Object.values(logsObj).reverse();
        body.innerHTML = logs.map(log => {
            // [특별 기능] 관리자가 준 선물이거나 차감 기록일 경우
            if (log.subject && log.subject.includes("선물")) {
                return `
                    <tr class="admin-gift-row">
                        <td style="font-size:9px; color:#aaa;">${log.date || '-'}</td>
                        <td colspan="2" style="color:#d8b4fe; font-weight:bold;">🎁 ${log.subject}</td>
                        <td style="color:#22d3ee; font-weight:bold;">${log.earnedGems ? '+' + log.earnedGems : ''}</td>
                        <td style="color:#fbbf24; font-weight:bold;">${log.earnedCoins ? '+' + log.earnedCoins : ''}</td>
                    </tr>
                `;
            }

            // 일반 공부 기록
            return `
                <tr>
                    <td style="font-size:9px; color:#aaa;">${log.date || '-'}</td>
                    <td>${log.subject || '-'}</td>
                    <td>${log.score || 0}점</td>
                    <td style="color:#22d3ee">+${log.earnedGems || 0}</td>
                    <td style="color:#fbbf24">${log.earnedCoins > 0 ? '+'+log.earnedCoins : '-'}</td>
                </tr>
            `;
        }).join('');
    }

// 🌟 [수정] 뱃지 상태 업데이트 및 마우스 오버(말풍선) 날짜 삽입
    function refreshBadges(logsObj) {
        // 임시로 가장 마지막 공부한 날짜를 가져옵니다. 
        // (나중에 DB가 고도화되면 뱃지별 획득 날짜를 정확히 매칭할 수 있습니다)
        let latestDate = "✨ 획득 완료 ✨";
        if (logsObj) {
            const logsArray = Object.values(logsObj);
            if(logsArray.length > 0) {
                // "26.03.10" 처럼 앞부분 날짜만 자르기
                latestDate = "획득일: " + logsArray[logsArray.length - 1].date.split(' ')[0];
            }
        }

        myBadges.forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                el.classList.add('owned');
                // HTML 요소에 data-date 속성을 넣어주면 CSS의 ::after가 이를 읽어서 말풍선으로 띄워줍니다!
                el.setAttribute('data-date', latestDate);
            }
        });
    }

    // 탭 전환 함수
    function openTab(evt, tabName) {
        document.querySelectorAll(".content-section").forEach(s => s.style.display = "none");
        document.querySelectorAll(".tab-btn").forEach(t => t.classList.remove("active"));
        document.getElementById('character-section').style.display = (tabName === 'decor') ? 'block' : 'none';
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.classList.add("active");
    }
</script>
</body>
</html>
