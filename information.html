    <style>

        .exchange-box.calendar { background: linear-gradient(135deg, #eab308, #a16207); border: 2px solid #fde047; }
        
        .exchange-box span { font-size: 14px; font-weight: 900; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        .exchange-box button { 
            background: white; border: none; padding: 8px 15px;

        .exchange-box.fire button { color: #ef4444; }

        .badge-item.owned { position: relative; cursor: pointer; }
        .badge-item.owned:hover::after, .badge-item.owned:active::after {
            content: attr(data-date); position: absolute; bottom: 115%; left: 50%; transform: translateX(-50%);

        @keyframes popUp {
            from { opacity: 0; transform: translate(-50%, 5px); }

        }
        
        @media (max-width: 400px) {
            .item-grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCbhFq8vcLem8DoMdlsXpC-ZRYELhJSFHU",
    authDomain: "championship-8f923.firebaseapp.com",
    databaseURL: "https://championship-8f923-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "championship-8f923",
    storageBucket: "championship-8f923.firebasestorage.app",
    messagingSenderId: "118704807417",
    appId: "1:118704807417:web:b1cacb9636d51a38d67128",
    measurementId: "G-KLHCC95R2C"
  }

    // 파이어베이스 에러 방지용 안전장치
    try {
        if (!firebase.apps.length && Object.keys(firebaseConfig).length > 0) {
            firebase.initializeApp(firebaseConfig);
        }
    } catch(e) {
        console.warn("Firebase 설정이 비어있거나 에러가 발생했습니다.");
    }

    const userId = localStorage.getItem('loginId'); 

    // 🌟 1. 페이지가 켜지자마자 로컬 스토리지에 있는 정보로 즉각 세팅 (DB연동 전 끊김 방지)
    const savedName = localStorage.getItem('userName') || "위대한 마법사";
    document.getElementById('user-display-name').innerText = savedName;
    document.getElementById('current-gems').innerText = localStorage.getItem('userGems') || "0";
    document.getElementById('current-coins').innerText = localStorage.getItem('userCoins') || "0";

    let gems = parseInt(localStorage.getItem('userGems')) || 0;
    let coins = parseInt(localStorage.getItem('userCoins')) || 0;
    let fireballs = 0;
    let calendarTokens = 0; 
    let purchased = ["dog.png"];
    let myBadges = [];

    function getNowFormattedString() {
        const now = new Date();
        const yy = String(now.getFullYear()).substring(2);
        const mm = String(now.getMonth() + 1).padStart(2, '0');
        const dd = String(now.getDate()).padStart(2, '0');
        const hh = String(now.getHours()).padStart(2, '0');
        const min = String(now.getMinutes()).padStart(2, '0');
        return `${yy}.${mm}.${dd} ${hh}:${min}`;
    }

    window.onload = function() {
        if (!userId) {
            alert("로그인 정보가 없습니다. 다시 로그인 해주세요.");
            location.href = "index.html";
            return;
        }
        
        loadLook();

        // 파이어베이스가 정상적으로 연결되었을 때만 데이터 덮어쓰기
        if (firebase.apps.length > 0) {
            const db = firebase.database();
            db.ref('approvedUsers/' + userId).on('value', (snapshot) => {
                const userData = snapshot.val();
                if (userData) {
                    gems = userData.gems || 0;
                    coins = userData.coins || 0;
                    fireballs = userData.fireballCount || 0;
                    calendarTokens = userData.calendarCount || 0; 
                    purchased = userData.purchasedItems || ["dog.png"];
                    myBadges = userData.myBadges || [];

                    updateUI();
                    renderLogs(userData.practiceLogs); 
                    refreshBadges(userData.practiceLogs); 
                    
                    document.getElementById('user-display-name').innerText = userData.name || savedName;
                }
            });
        }
    };

    function updateUI() {
        document.getElementById('current-gems').innerText = gems;
        document.getElementById('current-coins').innerText = coins;
        document.getElementById('fireball-count').innerText = fireballs;
        document.getElementById('calendar-count').innerText = calendarTokens;

        document.querySelectorAll('.item-btn').forEach(btn => {
            const attr = btn.getAttribute('onclick');
            if (attr) {
                const file = attr.split("'")[3];
                if (purchased.includes(file)) {
                    btn.classList.remove('locked');
                    btn.innerText = btn.innerText.replace('❓ ', '');
                }
            }
        });
    }

    function buyOrApply(type, file, price, btn) {
        if (!purchased.includes(file)) {
            // 🌟 열정 뿜뿜 모티베이션 문구 적용!
            if (gems < price) {
                return alert("앗! 보석이 아직 부족하네요 💎\n\n하지만 실망하지 마세요!\n오늘도 열심히 문제를 풀고 지식을 쌓다 보면 금방 모을 수 있을 거예요! 🔥\n\n위대한 마법사가 되기 위한 도전을 계속해 주세요! 넌 할 수 있어! 🚀");
            }

            if (confirm(`보석 ${price}개를 사용하여 구매할까요?`)) {
                const newPurchased = [...purchased, file];
                const logData = {
                    date: getNowFormattedString(),
                    subject: "상점: 아이템 구매",
                    score: "-",
                    earnedGems: -price, 
                    earnedCoins: 0
                };

                const db = firebase.database();
                db.ref('approvedUsers/' + userId).update({
                    gems: gems - price,
                    purchasedItems: newPurchased
                }).then(() => {
                    db.ref('approvedUsers/' + userId + '/practiceLogs').push(logData).then(() => {
                        alert("구매 성공! 멋진 아이템을 장착해보세요!");
                    });
                });
            }
        } else {
            const img = document.getElementById(type);
            if (img.style.display === 'block' && img.src.includes(file) && type !== 'character') {
                img.style.display = 'none';
                localStorage.removeItem('my' + type.charAt(0).toUpperCase() + type.slice(1));
                btn.classList.remove('active');
            } else {
                img.src = file;
                img.style.display = 'block';
                btn.parentElement.querySelectorAll('.item-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                localStorage.setItem('my' + type.charAt(0).toUpperCase() + type.slice(1), file);
            }
        }
    }

    function exchangeFireball() {
        if (fireballs <= 0) return alert("교환할 파이어볼이 없어요! 🔥\n매일 출석해서 파이어볼을 모아보세요!");
        if (confirm("파이어볼 1개를 보석 30개로 교환할까요?")) {
            const logData = { date: getNowFormattedString(), subject: "상점: 파이어볼 ↔ 보석 교환", score: "-", earnedGems: 30, earnedCoins: 0 };
            const db = firebase.database();
            db.ref('approvedUsers/' + userId).update({ fireballCount: fireballs - 1, gems: gems + 30 }).then(() => {
                db.ref('approvedUsers/' + userId + '/practiceLogs').push(logData).then(() => { alert("교환 완료!"); });
            });
        }
    }

    function exchangeCalendar() {
        if (calendarTokens <= 0) return alert("교환할 황금달력이 없어요! 🗓️\n한 달 개근에 도전하세요!");
        if (confirm("황금달력 1개를 보석 100개로 교환할까요?")) {
            const logData = { date: getNowFormattedString(), subject: "상점: 황금달력 ↔ 보석 교환", score: "-", earnedGems: 100, earnedCoins: 0 };
            const db = firebase.database();
            db.ref('approvedUsers/' + userId).update({ calendarCount: calendarTokens - 1, gems: gems + 100 }).then(() => {
                db.ref('approvedUsers/' + userId + '/practiceLogs').push(logData).then(() => { alert("교환 완료! 100 보석 획득 💎"); });
            });
        }
    }

    function loadLook() {
        ['Character','Wing','Cape','Shield','Staff','Pet'].forEach(t => {
            const saved = localStorage.getItem('my' + t);
            if (saved) {
                const el = document.getElementById(t.toLowerCase());
                if(el) { el.src = saved; el.style.display = 'block'; }
                document.querySelectorAll('.item-btn').forEach(btn => {
                    if (btn.getAttribute('onclick') && btn.getAttribute('onclick').includes(`'${saved}'`)) {
                        btn.classList.add('active');
                    }
                });
            }
        });
    }

    function renderLogs(logsObj) {
        const body = document.getElementById('study-logs-body');
        if (!logsObj) {
            body.innerHTML = "<tr><td colspan='5' style='padding:30px; color:#64748b; font-weight:bold;'>아직 공부 기록이 없습니다.</td></tr>";
            return;
        }
        const logs = Object.values(logsObj).reverse();
        body.innerHTML = logs.map(log => {
            if (log.subject && log.subject.includes("선물")) {
                return `
                    <tr class="admin-gift-row">
                        <td style="font-size:10px; color:#94a3b8;">${log.date || '-'}</td>
                        <td colspan="2" style="color:#d8b4fe; font-weight:900;">🎁 ${log.subject}</td>
                        <td style="color:#22d3ee; font-weight:900;">${log.earnedGems ? '+' + log.earnedGems : ''}</td>
                        <td style="color:#fbbf24; font-weight:900;">${log.earnedCoins ? '+' + log.earnedCoins : ''}</td>
                    </tr>
                `;
            }
            return `
                <tr>
                    <td style="font-size:10px; color:#94a3b8;">${log.date || '-'}</td>
                    <td style="color:#e2e8f0">${log.subject || '-'}</td>
                    <td style="color:#cbd5e1">${log.score || 0}점</td>
                    <td style="color:#22d3ee; font-weight:900;">${log.earnedGems > 0 ? '+'+log.earnedGems : log.earnedGems}</td>
                    <td style="color:#fbbf24; font-weight:900;">${log.earnedCoins > 0 ? '+'+log.earnedCoins : (log.earnedCoins || '-')}</td>
                </tr>
            `;
        }).join('');
    }

    function refreshBadges(logsObj) {
        let latestDate = "✨ 획득 완료 ✨";
        if (logsObj) {
            const logsArray = Object.values(logsObj);
            if(logsArray.length > 0) {
                const dText = logsArray[logsArray.length - 1].date || "";
                latestDate = "최근 접속: " + dText.split(' ')[0];
            }
        }
        myBadges.forEach(id => {
            const el = document.getElementById(id);
            if (el) { el.classList.add('owned'); el.setAttribute('data-date', latestDate); }
        });
    }

    // 🌟 안전장치로 밖으로 꺼낸 탭 이동 함수 (에러가 나도 버튼은 눌리게)
    window.openTab = function(evt, tabName) {
        document.querySelectorAll(".content-section").forEach(s => s.style.display = "none");
        document.querySelectorAll(".tab-btn").forEach(t => t.classList.remove("active"));
        document.getElementById('character-section').style.display = (tabName === 'decor') ? 'block' : 'none';
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.classList.add("active");
    }
</script>
</body>
</html>
